  <script id="FEATURE_CONSOLE_MERGE_V3">(function(){
    if (window.__CONSOLE_MERGE_V3__) return; window.__CONSOLE_MERGE_V3__=true;

    function canonicalText(){
      try{
        if (window.KyanbasuCommands && typeof window.KyanbasuCommands.runtimeCommandText === 'function'){
          return window.KyanbasuCommands.runtimeCommandText(window, {short:true});
        }
      }catch(_){}
      try{
        var txt = (typeof window.buildCommands === 'function') ? String(window.buildCommands() || '') : '';
        if (window.KyanbasuCommands && typeof window.KyanbasuCommands.shortifyText === 'function'){
          return window.KyanbasuCommands.shortifyText(txt, window);
        }
        return txt;
      }catch(_){}
      return '';
    }

    // --- writers with change detection ---
    var _lastTextarea = null, _lastPre = null;
    function syncTextarea(text){
      var el = document.getElementById("consoleText");
      if (!el) return;
      if (text !== _lastTextarea || el.value !== text){
        el.value = text;
        _lastTextarea = text;
      }
    }
    function syncDepsOverlay(text){
      var pre = document.getElementById("depCmdPre");
      if (!pre) return;
      if (text !== _lastPre || pre.textContent !== text){
        pre.textContent = text;
        _lastPre = text;
      }
    }

    // --- debounced runner ---
    var _t = null, _queued = false;
    function scheduleMerge(delay){
      if (_queued) return;
      _queued = true;
      if (_t) clearTimeout(_t);
      _t = setTimeout(function(){
        _queued = false;
        try{
          var text = canonicalText();
          syncTextarea(text);
          syncDepsOverlay(text);
        }catch(_){}
      }, Math.max(50, delay|0)); // ~20fps
    }

    // --- wrap updateConsole once (after any other wrappers) ---
    if (!window.updateConsole){
      window.updateConsole = function(){ scheduleMerge(50); };
    }else if (!window.updateConsole.__mergeV3){
      var orig = window.updateConsole;
      window.updateConsole = function(){ var rv = orig.apply(this, arguments); scheduleMerge(50); return rv; };
      window.updateConsole.__mergeV3 = true;
    }

    // initial paint
    scheduleMerge(0);
  })();</script>
