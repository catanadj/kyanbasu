<script id="FEATURE_CANVAS_WORKBENCHES_V1">
(function(){
  if (window.__CANVAS_WORKBENCHES_V1__) return;
  window.__CANVAS_WORKBENCHES_V1__ = true;

  var CanvasStorage = window.KyanbasuStorage;
  if (!CanvasStorage) throw new Error('KyanbasuStorage must load before canvas workbenches');
  var state = null;
  var saveTimer = 0;
  var switching = false;

  function qs(sel, root){ return (root || document).querySelector(sel); }
  function qsa(sel, root){ return Array.prototype.slice.call((root || document).querySelectorAll(sel)); }
  function uid(){ return 'wb-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7); }
  function defaultState(){
    return {version:1, activeId:'main', nextIndex:2, workbenches:[{id:'main', name:'Main', layout:null, notes:null}]};
  }
  function normalize(raw){
    var s = raw && typeof raw === 'object' ? raw : defaultState();
    if (!Array.isArray(s.workbenches) || !s.workbenches.length) s.workbenches = defaultState().workbenches;
    if (!s.activeId || !s.workbenches.some(function(w){ return w && w.id === s.activeId; })) s.activeId = s.workbenches[0].id;
    s.nextIndex = Math.max(2, parseInt(s.nextIndex || 2, 10) || 2);
    s.workbenches.forEach(function(w, i){
      if (!w.id) w.id = i === 0 ? 'main' : uid();
      if (!w.name) w.name = i === 0 ? 'Main' : ('Workbench ' + (i + 1));
      if (w.notes) w.notes = normalizeNotesData(w.notes);
    });
    return s;
  }
  function load(){
    if (state) return state;
    try{
      var saved = CanvasStorage.getJSON('workbenches', null);
      state = normalize(saved || defaultState());
    }catch(_){ state = defaultState(); }
    return state;
  }
  function saveNow(){
    if (!state) return;
    CanvasStorage.setJSON('workbenches', state, {snapshot:true});
  }
  function saveSoon(){
    if (switching) return;
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){ saveTimer = 0; captureActive(); saveNow(); renderTabs(); }, 260);
  }
  function activeWorkbench(){
    var s = load();
    return s.workbenches.filter(function(w){ return w.id === s.activeId; })[0] || s.workbenches[0];
  }
  function workbenchById(id){
    return load().workbenches.filter(function(w){ return w && w.id === id; })[0] || null;
  }
  function cleanName(name){
    name = String(name || '').replace(/\s+/g, ' ').trim();
    return name ? name.slice(0, 36) : '';
  }
  function captureWorkbench(){
    var layout = null, notes = null;
    try{
      if (window.KyanbasuLayoutPersist && typeof window.KyanbasuLayoutPersist.captureState === 'function'){
        layout = window.KyanbasuLayoutPersist.captureState();
      }
    }catch(_){}
    try{
      if (window.KyanbasuNotes && typeof window.KyanbasuNotes.exportData === 'function'){
        notes = window.KyanbasuNotes.exportData();
      }
    }catch(_){}
    return {layout: layout, notes: notes};
  }
  function captureActive(){
    var wb = activeWorkbench();
    if (!wb) return;
    var snap = captureWorkbench();
    wb.layout = snap.layout;
    wb.notes = snap.notes;
    wb.savedAt = Date.now();
  }
  function emptyLayout(){
    return {version:1, zoom:100, drawer_collapsed:true, nodes:{}, projects:[], tags:[]};
  }
  function emptyNotes(){
    return {kind:'kyanbasu.notes', version:3, notes:[], links:[], buckets:{}};
  }
  function workbenchCounts(w){
    var layout = w && w.layout;
    var notes = w && w.notes;
    if (w && w.id === load().activeId){
      try{
        if (window.KyanbasuLayoutPersist && typeof window.KyanbasuLayoutPersist.captureState === 'function'){
          layout = window.KyanbasuLayoutPersist.captureState();
        }
      }catch(_){}
      try{
        if (window.KyanbasuNotes && typeof window.KyanbasuNotes.exportData === 'function'){
          notes = window.KyanbasuNotes.exportData();
        }
      }catch(_){}
    }
    var taskCount = 0;
    try{ taskCount = layout && layout.nodes ? Object.keys(layout.nodes).length : 0; }catch(_){}
    var noteCount = 0;
    try{ noteCount = notes && Array.isArray(notes.notes) ? notes.notes.length : 0; }catch(_){}
    return {tasks:taskCount, notes:noteCount};
  }
  function cloneData(value, fallback){
    try{ return value ? JSON.parse(JSON.stringify(value)) : fallback; }catch(_){ return fallback; }
  }
  function normalizeNotesData(value){
    var data = cloneData(value, emptyNotes());
    if (!data || !Array.isArray(data.notes)) data = emptyNotes();
    data.kind = 'kyanbasu.notes';
    return data;
  }
  function exportData(){
    captureActive();
    saveNow();
    var s = load();
    return {
      kind: 'kyanbasu.workbenches',
      version: 1,
      exportedAt: new Date().toISOString(),
      activeId: s.activeId,
      nextIndex: s.nextIndex,
      workbenches: s.workbenches.map(function(w){
        var counts = workbenchCounts(w);
        return {
          id: w.id,
          name: w.name,
          savedAt: w.savedAt || null,
          tasks: counts.tasks,
          notesCount: counts.notes,
          layout: cloneData(w.layout, emptyLayout()),
          notes: normalizeNotesData(w.notes)
        };
      })
    };
  }
  function exportJSON(){
    return JSON.stringify(exportData(), null, 2);
  }
  function downloadExport(){
    var text = exportJSON();
    var blob = new Blob([text], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'kyanbasu-workbenches.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 0);
  }
  function importData(data){
    if (typeof data === 'string') data = JSON.parse(data);
    var acceptedKind = data && data.kind === 'kyanbasu.workbenches';
    if (!acceptedKind || !Array.isArray(data.workbenches) || !data.workbenches.length){
      throw new Error('Import file must contain a workbenches array');
    }
    var ids = {};
    var imported = data.workbenches.map(function(w, i){
      w = w && typeof w === 'object' ? w : {};
      var id = String(w.id || '').trim() || (i === 0 ? 'main' : uid());
      while (ids[id]) id = uid();
      ids[id] = true;
      return {
        id: id,
        name: cleanName(w.name) || (i === 0 ? 'Main' : ('Workbench ' + (i + 1))),
        layout: cloneData(w.layout, emptyLayout()),
        notes: normalizeNotesData(w.notes),
        savedAt: w.savedAt || Date.now()
      };
    });
    var activeId = ids[data.activeId] ? data.activeId : imported[0].id;
    state = normalize({
      version: 1,
      activeId: activeId,
      nextIndex: Math.max(imported.length + 1, parseInt(data.nextIndex || 0, 10) || 0),
      workbenches: imported
    });
    saveNow();
    applyWorkbench(activeWorkbench());
    renderTabs();
    return {workbenches:state.workbenches.length, activeId:state.activeId};
  }
  function importJSON(text){
    return importData(text);
  }
  function applyWorkbench(wb){
    switching = true;
    try{
      var layout = wb && wb.layout ? wb.layout : emptyLayout();
      if (window.KyanbasuLayoutPersist && typeof window.KyanbasuLayoutPersist.replaceState === 'function'){
        window.KyanbasuLayoutPersist.replaceState(layout);
      }
      var notes = wb && wb.notes ? wb.notes : emptyNotes();
      if (window.KyanbasuNotes && typeof window.KyanbasuNotes.importData === 'function'){
        window.KyanbasuNotes.importData(notes);
      }
      try{ if (typeof drawLinks === 'function') drawLinks(); }catch(_){}
      try{ if (typeof renderViewer === 'function') renderViewer(); }catch(_){}
      try{ if (window.KyanbasuNavigator && typeof window.KyanbasuNavigator.render === 'function') window.KyanbasuNavigator.render(); }catch(_){}
    } finally {
      switching = false;
    }
  }
  function switchTo(id){
    var s = load();
    if (id === s.activeId) return;
    try{ captureActive(); }catch(_){}
    var next = s.workbenches.filter(function(w){ return w.id === id; })[0];
    if (!next) return;
    s.activeId = id;
    saveNow();
    try{ applyWorkbench(next); }catch(_){}
    renderTabs();
  }
  function createWorkbench(){
    var s = load();
    captureActive();
    var wb = {id:uid(), name:'Workbench ' + s.nextIndex, layout:emptyLayout(), notes:emptyNotes(), savedAt:Date.now()};
    s.nextIndex += 1;
    s.workbenches.push(wb);
    s.activeId = wb.id;
    saveNow();
    applyWorkbench(wb);
    renderTabs();
    return wb.id;
  }
  function duplicateWorkbench(id){
    var s = load();
    captureActive();
    var source = workbenchById(id || s.activeId);
    if (!source) return null;
    var copy = {
      id: uid(),
      name: cleanName(source.name + ' copy') || ('Workbench ' + s.nextIndex),
      layout: source.layout ? JSON.parse(JSON.stringify(source.layout)) : emptyLayout(),
      notes: source.notes ? JSON.parse(JSON.stringify(source.notes)) : emptyNotes(),
      savedAt: Date.now()
    };
    s.nextIndex += 1;
    s.workbenches.push(copy);
    s.activeId = copy.id;
    saveNow();
    applyWorkbench(copy);
    renderTabs();
    return copy.id;
  }
  function renameWorkbench(id, nextName){
    var wb = workbenchById(id);
    var name = cleanName(nextName);
    if (!wb || !name) return false;
    wb.name = name;
    wb.savedAt = Date.now();
    saveNow();
    renderTabs();
    return true;
  }
  function promptRename(id){
    var wb = workbenchById(id);
    if (!wb) return;
    var next = window.prompt ? window.prompt('Workbench name:', wb.name) : null;
    if (next !== null) renameWorkbench(id, next);
  }
  function deleteWorkbench(id, skipConfirm){
    var s = load();
    if (!id || s.workbenches.length <= 1) return false;
    var index = -1;
    for (var i=0; i<s.workbenches.length; i++) if (s.workbenches[i].id === id) index = i;
    if (index < 0) return false;
    var wb = s.workbenches[index];
    if (!skipConfirm && window.confirm && !window.confirm('Delete workbench "' + wb.name + '"?')) return false;
    var deletingActive = s.activeId === id;
    if (!deletingActive) captureActive();
    s.workbenches.splice(index, 1);
    if (deletingActive){
      var next = s.workbenches[Math.max(0, Math.min(index, s.workbenches.length - 1))];
      s.activeId = next.id;
      saveNow();
      applyWorkbench(next);
    } else {
      saveNow();
    }
    renderTabs();
    return true;
  }
  function switchFromEvent(ev){
    var switcher = ev.target && ev.target.closest ? ev.target.closest('[data-workbench-switch]') : null;
    var tabRoot = ev.currentTarget && ev.currentTarget.classList && ev.currentTarget.classList.contains('tcWorkbenchTabs') ? ev.currentTarget : null;
    if (!switcher || (tabRoot && !tabRoot.contains(switcher))) return false;
    ev.preventDefault();
    switchTo(switcher.getAttribute('data-workbench-switch'));
    return true;
  }
  function ensureRoot(){
    var group = document.getElementById('workbenchGroup');
    if (!group){
      group = document.createElement('div');
      group.id = 'workbenchGroup';
      group.className = 'toolbarGroup toolbarGroupWorkbenches';
      group.setAttribute('data-label', 'Workbenches');
      var workbenchControls = qs('#shellWorkbenchControls');
      var leftControls = qs('.shellLeftControls');
      var canvas = qs('.toolbarGroupCanvas', leftControls || document);
      var shell = qs('.shellActions');
      if (workbenchControls) workbenchControls.appendChild(group);
      else if (leftControls) leftControls.insertBefore(group, canvas || leftControls.firstChild);
      else if (shell) shell.insertBefore(group, shell.firstChild);
    }
    if (!qs('.tcWorkbenchStrip', group)){
      group.innerHTML = '<div class="tcWorkbenchStrip"><div class="tcWorkbenchTabs"></div><button type="button" class="btn ghost tcWorkbenchAdd" title="Add workbench">+</button></div>';
      qs('.tcWorkbenchAdd', group).addEventListener('click', createWorkbench);
      var tabRoot = qs('.tcWorkbenchTabs', group);
      if (tabRoot && !tabRoot.__workbenchDelegated){
        tabRoot.__workbenchDelegated = true;
        tabRoot.addEventListener('pointerdown', function(ev){
          switchFromEvent(ev);
        }, true);
        tabRoot.addEventListener('mousedown', function(ev){
          switchFromEvent(ev);
        }, true);
        tabRoot.addEventListener('click', function(ev){
          switchFromEvent(ev);
        });
        tabRoot.addEventListener('dblclick', function(ev){
          var switcher = ev.target && ev.target.closest ? ev.target.closest('[data-workbench-switch]') : null;
          if (!switcher || !tabRoot.contains(switcher)) return;
          ev.preventDefault();
          promptRename(switcher.getAttribute('data-workbench-switch'));
        });
      }
    }
    return group;
  }
  function renderTabs(){
    var group = ensureRoot();
    var tabs = qs('.tcWorkbenchTabs', group);
    if (!tabs) return;
    var s = load();
    tabs.innerHTML = '';
    s.workbenches.forEach(function(w){
      var b = document.createElement('div');
      b.className = 'tcWorkbenchTab' + (w.id === s.activeId ? ' active' : '');
      b.title = 'Switch to ' + w.name;
      b.setAttribute('data-workbench-id', w.id);
      var switchBtn = document.createElement('button');
      switchBtn.type = 'button';
      switchBtn.className = 'tcWorkbenchTabSwitch';
      switchBtn.setAttribute('data-workbench-switch', w.id);
      switchBtn.title = 'Switch to ' + w.name;
      switchBtn.addEventListener('pointerdown', function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        switchTo(w.id);
      });
      switchBtn.addEventListener('mousedown', function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        switchTo(w.id);
      });
      switchBtn.addEventListener('click', function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        switchTo(w.id);
      });
      switchBtn.addEventListener('dblclick', function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        promptRename(w.id);
      });
      var main = document.createElement('span');
      main.className = 'tcWorkbenchTabMain';
      var label = document.createElement('span');
      label.className = 'tcWorkbenchTabName';
      label.textContent = w.name;
      main.appendChild(label);
      var counts = workbenchCounts(w);
      var meta = document.createElement('span');
      meta.className = 'tcWorkbenchTabMeta';
      meta.textContent = counts.tasks + 'T ' + counts.notes + 'N';
      main.appendChild(meta);
      switchBtn.appendChild(main);
      b.appendChild(switchBtn);
      var actions = document.createElement('span');
      actions.className = 'tcWorkbenchTabActions';
      var dup = document.createElement('button');
      dup.type = 'button';
      dup.className = 'tcWorkbenchTabAction';
      dup.textContent = '+';
      dup.title = 'Duplicate workbench';
      dup.addEventListener('click', function(ev){ ev.preventDefault(); ev.stopPropagation(); duplicateWorkbench(w.id); });
      actions.appendChild(dup);
      var edit = document.createElement('button');
      edit.type = 'button';
      edit.className = 'tcWorkbenchTabAction';
      edit.textContent = 'e';
      edit.title = 'Rename workbench';
      edit.addEventListener('click', function(ev){ ev.preventDefault(); ev.stopPropagation(); promptRename(w.id); });
      actions.appendChild(edit);
      if (s.workbenches.length > 1){
        var del = document.createElement('button');
        del.type = 'button';
        del.className = 'tcWorkbenchTabAction';
        del.textContent = 'x';
        del.title = 'Delete workbench';
        del.addEventListener('click', function(ev){ ev.preventDefault(); ev.stopPropagation(); deleteWorkbench(w.id, false); });
        actions.appendChild(del);
      }
      b.appendChild(actions);
      tabs.appendChild(b);
    });
  }
  function boot(){
    load();
    renderTabs();
    var wb = activeWorkbench();
    if (wb && (wb.layout || wb.notes)) setTimeout(function(){ applyWorkbench(wb); renderTabs(); }, 80);
    document.addEventListener('mouseup', saveSoon, true);
    document.addEventListener('touchend', saveSoon, true);
    window.addEventListener('beforeunload', function(){ captureActive(); saveNow(); });
    document.addEventListener('visibilitychange', function(){ if (document.hidden){ captureActive(); saveNow(); } });
  }

  window.KyanbasuWorkbenches = {
    list: function(){ return load().workbenches.map(function(w){ var c = workbenchCounts(w); return {id:w.id, name:w.name, tasks:c.tasks, notes:c.notes}; }); },
    active: function(){ var w = activeWorkbench(); return w ? {id:w.id, name:w.name} : null; },
    create: createWorkbench,
    duplicate: duplicateWorkbench,
    rename: renameWorkbench,
    delete: function(id){ return deleteWorkbench(id, true); },
    switchTo: switchTo,
    capture: function(){ captureActive(); saveNow(); },
    apply: function(){ applyWorkbench(activeWorkbench()); },
    exportData: exportData,
    exportJSON: exportJSON,
    downloadExport: downloadExport,
    importData: importData,
    importJSON: importJSON
  };

  window.addEventListener('load', function(){ setTimeout(boot, 260); });
  document.addEventListener('twdata', function(){ setTimeout(boot, 260); });
})();
</script>
