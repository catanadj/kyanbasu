name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Compile
        run: |
          python -m py_compile \
            TaskCanvas.py \
            taskcanvas/__init__.py \
            taskcanvas/cli.py \
            taskcanvas/injectors.py \
            taskcanvas/output.py \
            taskcanvas/payload.py \
            taskcanvas/task_io.py \
            tests/test_cli.py \
            tests/test_injectors.py \
            tests/test_payload.py \
            tests/test_task_io.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
