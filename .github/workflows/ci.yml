name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "CHANGELOG.md"
      - "Kyanbasu.py"
      - "LICENSE"
      - "MIGRATION.md"
      - "README.md"
      - "TaskCanvas.py"
      - "kyanbasu/**"
      - "pyproject.toml"
      - "taskcanvas/**"
      - "tests/**"
      - "scripts/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "CHANGELOG.md"
      - "Kyanbasu.py"
      - "LICENSE"
      - "MIGRATION.md"
      - "README.md"
      - "TaskCanvas.py"
      - "kyanbasu/**"
      - "pyproject.toml"
      - "taskcanvas/**"
      - "tests/**"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run Taskwarrior integration test job"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Compile
        run: python -m compileall -q Kyanbasu.py TaskCanvas.py kyanbasu taskcanvas tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Build wheel
        run: python -m pip wheel --no-build-isolation --no-deps --wheel-dir dist .

      - name: Smoke test wheel
        run: |
          python -m pip install --no-deps --target "${RUNNER_TEMP}/kyanbasu-wheel" dist/*.whl
          primary_version="$(cd "${RUNNER_TEMP}" && PYTHONPATH="${RUNNER_TEMP}/kyanbasu-wheel" "${RUNNER_TEMP}/kyanbasu-wheel/bin/kyanbasu" --version)"
          legacy_version="$(cd "${RUNNER_TEMP}" && PYTHONPATH="${RUNNER_TEMP}/kyanbasu-wheel" "${RUNNER_TEMP}/kyanbasu-wheel/bin/taskcanvas" --version)"
          test "${primary_version}" = "Kyanbasu 0.2.0"
          test "${legacy_version}" = "taskcanvas 0.2.0"

  integration:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Taskwarrior
        run: |
          sudo apt-get update
          sudo apt-get install -y taskwarrior

      - name: Run integration tests
        run: TASKCANVAS_RUN_INTEGRATION=1 python -m unittest tests.test_task_io_integration -v
