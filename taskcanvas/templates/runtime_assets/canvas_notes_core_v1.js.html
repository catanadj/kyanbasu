<script id="FEATURE_CANVAS_NOTES_CORE_V1">
(function(){
  if (window.TaskCanvasNotesCore) return;

  var NOTE_KINDS = [
    {value:'note', label:'Plain'},
    {value:'idea', label:'Idea'},
    {value:'question', label:'Question'},
    {value:'evidence', label:'Evidence'},
    {value:'assumption', label:'Assumption'},
    {value:'decision', label:'Decision'},
    {value:'action', label:'Action'},
    {value:'reference', label:'Reference'}
  ];
  var NOTE_STATUSES = [
    {value:'open', label:'Open'},
    {value:'resolved', label:'Resolved'},
    {value:'parked', label:'Parked'}
  ];
  var NOTE_RELATIONS = [
    {value:'manual', label:'Related to', inverseLabel:'Related from', structural:false},
    {value:'supports', label:'Supports', inverseLabel:'Supported by', structural:false},
    {value:'challenges', label:'Challenges', inverseLabel:'Challenged by', structural:false},
    {value:'answers', label:'Answers', inverseLabel:'Answered by', structural:false},
    {value:'causes', label:'Causes', inverseLabel:'Caused by', structural:false},
    {value:'leads_to', label:'Leads to', inverseLabel:'Follows from', structural:false},
    {value:'child', label:'Parent of', inverseLabel:'Child of', structural:true}
  ];
  var LINK_ANNOTATION_KINDS = [
    {value:'note', label:'Note'},
    {value:'question', label:'Question'},
    {value:'condition', label:'Condition'}
  ];

  function optionValue(value, options, fallback){
    value = String(value || '').trim().toLowerCase();
    for (var i=0; i<options.length; i++) if (options[i].value === value) return value;
    return fallback;
  }

  function optionLabel(value, options, fallback){
    value = optionValue(value, options, fallback);
    for (var i=0; i<options.length; i++) if (options[i].value === value) return options[i].label;
    return value;
  }

  function normalizeKind(value){ return optionValue(value, NOTE_KINDS, 'note'); }
  function normalizeStatus(value){ return optionValue(value, NOTE_STATUSES, 'open'); }
  function normalizeRelation(value){ return optionValue(value, NOTE_RELATIONS, 'manual'); }
  function normalizeAnnotationKind(value){ return optionValue(value, LINK_ANNOTATION_KINDS, 'note'); }
  function normalizeLinkAnnotation(annotation){
    if (typeof annotation === 'string') annotation = {kind:'note', text:annotation};
    if (!annotation || typeof annotation !== 'object') return null;
    var text = String(annotation.text || '').trim();
    if (!text) return null;
    return {kind:normalizeAnnotationKind(annotation.kind), text:text};
  }
  function relationLabel(value, inverse){
    value = normalizeRelation(value);
    for (var i=0; i<NOTE_RELATIONS.length; i++){
      if (NOTE_RELATIONS[i].value === value) return inverse ? NOTE_RELATIONS[i].inverseLabel : NOTE_RELATIONS[i].label;
    }
    return inverse ? 'Related from' : 'Related to';
  }

  function splitQuery(query){
    query = String(query || '').trim();
    var tokens = [];
    var current = '';
    var quote = '';
    for (var i=0; i<query.length; i++){
      var char = query.charAt(i);
      if (quote){
        if (char === quote) quote = '';
        else current += char;
      } else if (char === '"' || char === "'") quote = char;
      else if (/\s/.test(char)){
        if (current){ tokens.push(current); current = ''; }
      } else current += char;
    }
    if (current) tokens.push(current);
    return tokens;
  }

  function parseQuery(query){
    return splitQuery(query).map(function(token){
      var negated = token.charAt(0) === '-';
      if (negated) token = token.slice(1);
      var splitAt = token.indexOf(':');
      if (splitAt <= 0) return {field:'text', value:token.toLowerCase(), negated:negated};
      return {
        field:token.slice(0, splitAt).toLowerCase(),
        value:token.slice(splitAt + 1).toLowerCase(),
        negated:negated
      };
    }).filter(function(term){ return !!term.value; });
  }

  function optionExists(value, options){
    for (var i=0; i<options.length; i++) if (options[i].value === value) return true;
    return false;
  }

  function toInt(value, fallback){
    var parsed = parseInt(value, 10);
    return isFinite(parsed) ? parsed : fallback;
  }

  function timestamp(value, fallback){
    if (typeof value === 'string' && value.trim() && !/^\d+$/.test(value.trim())) value = Date.parse(value);
    var parsed = Number(value);
    return isFinite(parsed) && parsed > 0 ? Math.round(parsed) : fallback;
  }

  function durationMs(value){
    var match = String(value || '').trim().toLowerCase().match(/^(\d+)(h|d|w)$/);
    if (!match) return 0;
    var factor = match[2] === 'h' ? 3600000 : (match[2] === 'w' ? 604800000 : 86400000);
    return parseInt(match[1], 10) * factor;
  }

  function bucketText(bucket){
    var text = String(bucket || '').trim();
    return text || '(no bucket)';
  }

  function noteText(title, body){
    var first = String(title || '').trim();
    var second = String(body || '').trim();
    if (first && second) return first + '\n' + second;
    return first || second || 'New note';
  }

  function normalizeTaskRef(ref){
    if (!ref) return null;
    var uuid = String(ref.uuid || '').trim();
    var short = String(ref.short || '').trim();
    if (!uuid && !short) return null;
    return {
      uuid: uuid,
      short: short,
      desc: String(ref.desc || '').trim(),
      project: String(ref.project || '').trim()
    };
  }

  function normalizeNote(note, options){
    note = note || {};
    options = options || {};
    var now = timestamp(options.now, Date.now());
    if (!note.id) note.id = options.uid ? options.uid() : '';
    if (!note.content) note.content = noteText(note.title, note.body);
    delete note.title;
    delete note.body;
    note.x = toInt(note.x, 160);
    note.y = toInt(note.y, 160);
    note.bucket = bucketText(note.bucket);
    note.kind = normalizeKind(note.kind);
    note.status = normalizeStatus(note.status);
    note.color = String(note.color || '').trim();
    if (!note.color || (options.isValidColor && !options.isValidColor(note.color))) delete note.color;
    note.collapsed = !!note.collapsed;
    note.taskRefs = Array.isArray(note.taskRefs) ? note.taskRefs.map(normalizeTaskRef).filter(Boolean) : [];
    note.createdAt = timestamp(note.createdAt, now);
    note.updatedAt = timestamp(note.updatedAt, note.createdAt);
    note.reviewedAt = timestamp(note.reviewedAt, 0);
    return note;
  }

  function linkKey(link){
    return link ? [link.from || '', link.to || '', normalizeRelation(link.type)].join('::') : '';
  }

  function childPathExists(startId, targetId, links, exceptKey){
    var stack = [startId];
    var seen = Object.create(null);
    while (stack.length){
      var id = stack.pop();
      if (id === targetId) return true;
      if (seen[id]) continue;
      seen[id] = true;
      links.forEach(function(link){
        if (!link || link.type !== 'child' || linkKey(link) === exceptKey || link.from !== id) return;
        stack.push(link.to);
      });
    }
    return false;
  }

  function validIdChecker(notes, validIds){
    if (validIds) return function(id){ return !!validIds[id]; };
    var ids = Object.create(null);
    (Array.isArray(notes) ? notes : []).forEach(function(note){ if (note && note.id) ids[note.id] = true; });
    return function(id){ return !!ids[id]; };
  }

  function validateLink(candidate, links, options){
    candidate = candidate || {};
    links = Array.isArray(links) ? links : [];
    options = options || {};
    var from = candidate.from;
    var to = candidate.to;
    var type = normalizeRelation(candidate.type);
    var exceptKey = options.exceptKey || null;
    var exists = validIdChecker(options.notes, options.validIds);
    if (!from || !to || !exists(from) || !exists(to)) return {ok:false, reason:'Cannot link missing notes.'};
    if (from === to) return {ok:false, reason:type === 'child' ? 'A note cannot be its own child.' : 'A note cannot link to itself.'};
    if (links.some(function(link){
      return link && linkKey(link) !== exceptKey && link.from === from && link.to === to;
    })) return {ok:false, reason:'These notes are already linked.'};
    if (type !== 'child') return {ok:true, reason:''};
    if (links.some(function(link){
      return link && linkKey(link) !== exceptKey && link.type === 'child' && link.to === to;
    })) return {ok:false, reason:'This note already has a parent.'};
    if (childPathExists(to, from, links, exceptKey)) return {ok:false, reason:'This child link would create a cycle.'};
    return {ok:true, reason:''};
  }

  function sanitizeLinks(rawLinks, validIds){
    var accepted = [];
    var dropped = 0;
    var droppedChild = 0;
    (Array.isArray(rawLinks) ? rawLinks : []).forEach(function(link){
      if (!link || typeof link !== 'object') { dropped++; return; }
      var candidate = {from:link.from, to:link.to, type:normalizeRelation(link.type)};
      var annotation = normalizeLinkAnnotation(link.annotation);
      if (annotation) candidate.annotation = annotation;
      if (!validateLink(candidate, accepted, {validIds:validIds}).ok){
        dropped++;
        if (candidate.type === 'child') droppedChild++;
        return;
      }
      accepted.push(candidate);
    });
    return {links:accepted, dropped:dropped, droppedChild:droppedChild};
  }

  function noteCodePrefix(index){
    var value = Math.max(0, index);
    var output = '';
    do {
      output = String.fromCharCode(65 + (value % 26)) + output;
      value = Math.floor(value / 26) - 1;
    } while (value >= 0);
    return output;
  }

  function sortRoots(items){
    return items.slice().sort(function(a, b){
      var ax = toInt(a.x, 160), bx = toInt(b.x, 160);
      if (ax !== bx) return ax - bx;
      var ay = toInt(a.y, 160), by = toInt(b.y, 160);
      if (ay !== by) return ay - by;
      return String(a.id).localeCompare(String(b.id));
    });
  }

  function sortChildren(items){
    return items.slice().sort(function(a, b){
      var ay = toInt(a.y, 160), by = toInt(b.y, 160);
      if (ay !== by) return ay - by;
      var ax = toInt(a.x, 160), bx = toInt(b.x, 160);
      if (ax !== bx) return ax - bx;
      return String(a.id).localeCompare(String(b.id));
    });
  }

  function graphIndex(notes, links){
    var byId = Object.create(null);
    var parentByChild = Object.create(null);
    var childrenByParent = Object.create(null);
    notes.forEach(function(note){ if (note && note.id) byId[note.id] = note; });
    links.forEach(function(link){
      if (!link || link.type !== 'child' || !byId[link.from] || !byId[link.to]) return;
      parentByChild[link.to] = link.from;
      if (!childrenByParent[link.from]) childrenByParent[link.from] = [];
      childrenByParent[link.from].push(byId[link.to]);
    });
    Object.keys(childrenByParent).forEach(function(id){ childrenByParent[id] = sortChildren(childrenByParent[id]); });
    return {byId:byId, parentByChild:parentByChild, childrenByParent:childrenByParent};
  }

  function computeLabels(notes, links){
    notes = Array.isArray(notes) ? notes : [];
    links = Array.isArray(links) ? links : [];
    var index = graphIndex(notes, links);
    var labels = {};
    var roots = sortRoots(notes.filter(function(note){ return note && !index.parentByChild[note.id]; }));
    function walk(note, label, seen){
      if (!note || seen[note.id]) return;
      var nextSeen = Object.assign({}, seen);
      nextSeen[note.id] = true;
      labels[note.id] = label;
      (index.childrenByParent[note.id] || []).forEach(function(child, childIndex){
        walk(child, label + '-' + (childIndex + 1), nextSeen);
      });
    }
    roots.forEach(function(root, rootIndex){ walk(root, noteCodePrefix(rootIndex) + '1', {}); });
    return labels;
  }

  function outline(notes, links){
    notes = Array.isArray(notes) ? notes : [];
    links = Array.isArray(links) ? links : [];
    var index = graphIndex(notes, links);
    var labels = computeLabels(notes, links);
    function pack(note, depth, seen){
      if (!note || seen[note.id]) return null;
      var nextSeen = Object.assign({}, seen);
      nextSeen[note.id] = true;
      return {
        id: note.id,
        label: labels[note.id] || '',
        content: note.content || '',
        bucket: bucketText(note.bucket),
        kind: normalizeKind(note.kind),
        kindLabel: optionLabel(note.kind, NOTE_KINDS, 'note'),
        status: normalizeStatus(note.status),
        statusLabel: optionLabel(note.status, NOTE_STATUSES, 'open'),
        depth: depth || 0,
        collapsed: !!note.collapsed,
        children: (index.childrenByParent[note.id] || []).map(function(child){
          return pack(child, (depth || 0) + 1, nextSeen);
        }).filter(Boolean)
      };
    }
    return sortRoots(notes.filter(function(note){ return note && !index.parentByChild[note.id]; })).map(function(root){
      return pack(root, 0, {});
    }).filter(Boolean);
  }

  function search(notes, links, query){
    notes = Array.isArray(notes) ? notes : [];
    links = Array.isArray(links) ? links : [];
    query = String(query || '').trim();
    if (!query) return [];
    var terms = parseQuery(query);
    var now = Date.now();
    if (!terms.length) return [];
    var labels = computeLabels(notes, links);
    function linkTerms(note){
      var terms = [];
      links.forEach(function(link){
        if (!link) return;
        if (link.from === note.id) terms.push(relationLabel(link.type, false));
        if (link.to === note.id) terms.push(relationLabel(link.type, true));
      });
      return terms.join(' ');
    }
    function haystack(note){
      return [
        labels[note.id] || '',
        note.content || '',
        bucketText(note.bucket),
        normalizeKind(note.kind),
        optionLabel(note.kind, NOTE_KINDS, 'note'),
        normalizeStatus(note.status),
        optionLabel(note.status, NOTE_STATUSES, 'open'),
        linkTerms(note)
      ].join(' ').toLowerCase();
    }
    function linksFor(note){ return links.filter(function(link){ return link && (link.from === note.id || link.to === note.id); }); }
    function matches(note, term){
      var field = term.field;
      var value = term.value;
      var related = linksFor(note);
      var childLinks = related.filter(function(link){ return link.type === 'child'; });
      var matched = false;
      if (field === 'kind' || field === 'type') matched = optionExists(value, NOTE_KINDS) && normalizeKind(note.kind) === value;
      else if (field === 'status') matched = optionExists(value, NOTE_STATUSES) && normalizeStatus(note.status) === value;
      else if (field === 'bucket') matched = bucketText(note.bucket).toLowerCase() === value;
      else if (field === 'id') matched = String(labels[note.id] || '').toLowerCase() === value;
      else if (field === 'relation') matched = optionExists(value, NOTE_RELATIONS) && related.some(function(link){ return normalizeRelation(link.type) === value; });
      else if (field === 'reviewed'){
        if (value === 'never') matched = !timestamp(note.reviewedAt, 0);
        else {
          var reviewedDuration = durationMs(value);
          matched = !!reviewedDuration && timestamp(note.reviewedAt, 0) >= now - reviewedDuration;
        }
      } else if (field === 'updated'){
        var updatedDuration = durationMs(value);
        matched = !!updatedDuration && timestamp(note.updatedAt, timestamp(note.createdAt, 0)) >= now - updatedDuration;
      }
      else if (field === 'has'){
        if (value === 'links') matched = related.length > 0;
        else if (value === 'tasks') matched = Array.isArray(note.taskRefs) && note.taskRefs.length > 0;
        else if (value === 'children') matched = childLinks.some(function(link){ return link.from === note.id; });
        else if (value === 'parent') matched = childLinks.some(function(link){ return link.to === note.id; });
      } else if (field === 'is'){
        if (value === 'orphan') matched = related.length === 0;
        else if (value === 'root') matched = !childLinks.some(function(link){ return link.to === note.id; });
        else if (value === 'leaf') matched = !childLinks.some(function(link){ return link.from === note.id; });
        else if (value === 'stale'){
          var activityAt = timestamp(note.reviewedAt, 0) || timestamp(note.updatedAt, timestamp(note.createdAt, now));
          matched = normalizeStatus(note.status) === 'open' && activityAt <= now - 30 * 86400000;
        }
      } else matched = haystack(note).indexOf((field === 'text' ? '' : field + ':') + value) !== -1;
      return term.negated ? !matched : matched;
    }
    return notes.filter(function(note){ return terms.every(function(term){ return matches(note, term); }); }).sort(function(a, b){
      var al = labels[a.id] || '';
      var bl = labels[b.id] || '';
      var freeTerm = terms.filter(function(term){ return term.field === 'text' && !term.negated; })[0];
      var ac = freeTerm ? haystack(a).indexOf(freeTerm.value) : 0;
      var bc = freeTerm ? haystack(b).indexOf(freeTerm.value) : 0;
      if (ac !== bc) return ac - bc;
      if (al !== bl) return al.localeCompare(bl);
      return String(a.id).localeCompare(String(b.id));
    });
  }

  window.TaskCanvasNotesCore = {
    version: 5,
    bucketText: bucketText,
    noteText: noteText,
    normalizeTaskRef: normalizeTaskRef,
    normalizeNote: normalizeNote,
    normalizeKind: normalizeKind,
    normalizeStatus: normalizeStatus,
    kindLabel: function(value){ return optionLabel(value, NOTE_KINDS, 'note'); },
    statusLabel: function(value){ return optionLabel(value, NOTE_STATUSES, 'open'); },
    kindOptions: function(){ return NOTE_KINDS.map(function(option){ return {value:option.value, label:option.label}; }); },
    statusOptions: function(){ return NOTE_STATUSES.map(function(option){ return {value:option.value, label:option.label}; }); },
    normalizeRelation: normalizeRelation,
    normalizeLinkAnnotation: normalizeLinkAnnotation,
    annotationKinds: function(){ return LINK_ANNOTATION_KINDS.map(function(option){ return {value:option.value, label:option.label}; }); },
    relationLabel: relationLabel,
    relationOptions: function(includeStructural){
      return NOTE_RELATIONS.filter(function(option){ return includeStructural || !option.structural; }).map(function(option){
        return {value:option.value, label:option.label, inverseLabel:option.inverseLabel, structural:option.structural};
      });
    },
    parseQuery: parseQuery,
    linkKey: linkKey,
    validateLink: validateLink,
    sanitizeLinks: sanitizeLinks,
    computeLabels: computeLabels,
    outline: outline,
    search: search
  };
})();
</script>
