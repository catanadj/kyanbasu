<script id="FEATURE_CANVAS_NAVIGATOR_V1">(function(){
  if (window.__FEATURE_CANVAS_NAVIGATOR_V1__) return; window.__FEATURE_CANVAS_NAVIGATOR_V1__ = true;
  function qs(sel, root){ return (root || document).querySelector(sel); }
  function qsa(sel, root){ return Array.prototype.slice.call((root || document).querySelectorAll(sel)); }
  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }
  function stage(){ return qs('#builderStage'); }
  function canvas(){ return qs('#builderWrap .canvas'); }
  function zoomInput(){ return qs('#zoom'); }
  function scale(){ return (typeof window.ZSCALE === 'number' && window.ZSCALE) ? window.ZSCALE : 1; }
  function storageKey(){ return 'kyanbasu:navigator:v1'; }
  function legacyStorageKey(){ return 'taskcanvas:navigator:v1'; }
  function toInt(v, fallback){
    var n = parseInt(v, 10);
    return isFinite(n) ? n : fallback;
  }
  function stageRectFor(el, fallbackW, fallbackH){
    if (!el) return null;
    var x = toInt(el.style.left, el.offsetLeft || 0);
    var y = toInt(el.style.top, el.offsetTop || 0);
    var w = toInt(el.style.width, el.offsetWidth || 0);
    var h = toInt(el.style.height, el.offsetHeight || 0);
    if ((!w || !h) && el.getBoundingClientRect){
      var r = el.getBoundingClientRect();
      var z = scale();
      w = w || Math.round(r.width / z);
      h = h || Math.round(r.height / z);
    }
    w = w || fallbackW || 0;
    h = h || fallbackH || 0;
    if (!w || !h) return null;
    return {x:x, y:y, w:w, h:h};
  }
  function unionRect(rects){
    rects = rects.filter(Boolean);
    if (!rects.length) return null;
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    rects.forEach(function(r){
      minX = Math.min(minX, r.x);
      minY = Math.min(minY, r.y);
      maxX = Math.max(maxX, r.x + r.w);
      maxY = Math.max(maxY, r.y + r.h);
    });
    return {x:minX, y:minY, w:Math.max(1, maxX - minX), h:Math.max(1, maxY - minY)};
  }
  function padRect(r, pad){
    if (!r) return null;
    return {x:r.x - pad, y:r.y - pad, w:r.w + pad * 2, h:r.h + pad * 2};
  }
  function taskRects(){
    return qsa('#builderStage .node').map(stageRectFor);
  }
  function noteRects(includeHidden){
    return qsa('#builderStage .tcNoteNode').filter(function(el){
      return includeHidden || el.style.display !== 'none';
    }).map(function(el){ return stageRectFor(el, 220, 92); });
  }
  function bucketRects(){
    return qsa('#builderStage .tcNoteBucket').map(stageRectFor);
  }
  function projectRects(){
    return qsa('#builderStage .projArea, #builderStage .tagArea').map(stageRectFor);
  }
  function contentRects(kind){
    if (kind === 'tasks') return taskRects().concat(projectRects());
    if (kind === 'notes') return noteRects(true).concat(bucketRects());
    if (kind === 'selection') return selectedRects();
    return taskRects().concat(projectRects(), noteRects(true), bucketRects());
  }
  function selectedRects(){
    var selectors = [
      '#builderStage .node.selected',
      '#builderStage .tcNoteNode.selected',
      '#builderStage path.tcNoteLink.selected'
    ];
    var rects = [];
    qsa(selectors.join(',')).forEach(function(el){
      if (el.tagName && String(el.tagName).toLowerCase() === 'path'){
        var key = el.getAttribute('data-link-key');
        if (!key) return;
        var from = qs('#builderStage .tcNoteNode[data-note-id="' + cssEsc(el.getAttribute('data-from') || '') + '"]');
        var to = qs('#builderStage .tcNoteNode[data-note-id="' + cssEsc(el.getAttribute('data-to') || '') + '"]');
        rects = rects.concat([stageRectFor(from), stageRectFor(to)]);
      } else {
        rects.push(stageRectFor(el));
      }
    });
    return rects;
  }
  function cssEsc(v){
    if (window.CSS && CSS.escape) return CSS.escape(String(v || ''));
    return String(v || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
  }
  function stageBounds(){
    var st = stage();
    return {
      x: 0,
      y: 0,
      w: (st && st.offsetWidth) || 5000,
      h: (st && st.offsetHeight) || 4000
    };
  }
  function viewportRect(){
    var cv = canvas(), st = stage();
    if (!cv || !st) return null;
    var cvr = cv.getBoundingClientRect();
    var sr = st.getBoundingClientRect();
    var z = scale();
    return {
      x: (cvr.left - sr.left) / z,
      y: (cvr.top - sr.top) / z,
      w: cvr.width / z,
      h: cvr.height / z
    };
  }
  function mapState(kind){
    var bounds = unionRect(contentRects(kind || 'all')) || stageBounds();
    bounds = padRect(bounds, 160);
    var st = stageBounds();
    bounds.x = clamp(bounds.x, 0, st.w);
    bounds.y = clamp(bounds.y, 0, st.h);
    bounds.w = Math.min(st.w - bounds.x, Math.max(1, bounds.w));
    bounds.h = Math.min(st.h - bounds.y, Math.max(1, bounds.h));
    var cw = 234, ch = 150;
    var m = Math.min(cw / bounds.w, ch / bounds.h);
    var ox = (cw - bounds.w * m) / 2;
    var oy = (ch - bounds.h * m) / 2;
    return {bounds:bounds, m:m, ox:ox, oy:oy, w:cw, h:ch};
  }
  function toMap(r, ms){
    return {
      x: ms.ox + (r.x - ms.bounds.x) * ms.m,
      y: ms.oy + (r.y - ms.bounds.y) * ms.m,
      w: Math.max(1, r.w * ms.m),
      h: Math.max(1, r.h * ms.m)
    };
  }
  function fromMap(x, y, ms){
    return {
      x: ms.bounds.x + (x - ms.ox) / ms.m,
      y: ms.bounds.y + (y - ms.oy) / ms.m
    };
  }
  function ensurePanel(){
    var panel = qs('#tcNavigator');
    if (panel) return panel;
    if (!document.body) return null;
    panel = document.createElement('div');
    panel.id = 'tcNavigator';
    panel.className = 'tcNavigator';
    panel.innerHTML =
      '<div class="tcNavigatorHead"><div class="tcNavigatorTitle">Navigator</div><div class="tcNavigatorMeta"></div></div>' +
      '<canvas class="tcNavigatorCanvas" width="234" height="150"></canvas>' +
      '<div class="tcNavigatorActions">' +
        '<button type="button" data-fit="all">Fit all</button>' +
        '<button type="button" data-fit="tasks">Tasks</button>' +
        '<button type="button" data-fit="notes">Notes</button>' +
        '<button type="button" data-fit="selection">Selection</button>' +
      '</div>';
    document.body.appendChild(panel);
    restorePanelPosition(panel);
    installPanelDrag(panel);
    qsa('[data-fit]', panel).forEach(function(btn){
      btn.addEventListener('click', function(){
        fitTo(btn.getAttribute('data-fit') || 'all');
      });
    });
    var cnv = qs('canvas', panel);
    cnv.addEventListener('mousedown', function(ev){
      ev.preventDefault();
      jumpFromEvent(ev);
      function move(e){ jumpFromEvent(e); }
      function up(){
        document.removeEventListener('mousemove', move, true);
        document.removeEventListener('mouseup', up, true);
      }
      document.addEventListener('mousemove', move, true);
      document.addEventListener('mouseup', up, true);
    });
    return panel;
  }
  function restorePanelPosition(panel){
    try{
      var raw = localStorage.getItem(storageKey());
      if (!raw){
        raw = localStorage.getItem(legacyStorageKey());
        if (raw) localStorage.setItem(storageKey(), raw);
      }
      if (!raw) return;
      var pos = JSON.parse(raw);
      if (!pos || !isFinite(pos.left) || !isFinite(pos.top)) return;
      placePanel(panel, pos.left, pos.top);
    }catch(_){}
  }
  function savePanelPosition(panel){
    try{
      var r = panel.getBoundingClientRect();
      localStorage.setItem(storageKey(), JSON.stringify({left:Math.round(r.left), top:Math.round(r.top)}));
    }catch(_){}
  }
  function placePanel(panel, left, top){
    var w = panel.offsetWidth || 252;
    var h = panel.offsetHeight || 210;
    left = clamp(left, 8, Math.max(8, window.innerWidth - w - 8));
    top = clamp(top, 8, Math.max(8, window.innerHeight - h - 8));
    panel.style.left = Math.round(left) + 'px';
    panel.style.top = Math.round(top) + 'px';
    panel.style.right = 'auto';
    panel.style.bottom = 'auto';
  }
  function installPanelDrag(panel){
    var head = qs('.tcNavigatorHead', panel);
    if (!head || head.__tcNavigatorDrag) return;
    head.__tcNavigatorDrag = true;
    head.addEventListener('mousedown', function(ev){
      if (ev.button !== 0) return;
      if (ev.target && ev.target.closest && ev.target.closest('button, input, canvas')) return;
      var r = panel.getBoundingClientRect();
      var start = {x:ev.clientX, y:ev.clientY, left:r.left, top:r.top};
      panel.classList.add('dragging');
      ev.preventDefault();
      function move(e){
        placePanel(panel, start.left + e.clientX - start.x, start.top + e.clientY - start.y);
      }
      function up(){
        panel.classList.remove('dragging');
        savePanelPosition(panel);
        document.removeEventListener('mousemove', move, true);
        document.removeEventListener('mouseup', up, true);
      }
      document.addEventListener('mousemove', move, true);
      document.addEventListener('mouseup', up, true);
    });
  }
  function jumpFromEvent(ev){
    var cnv = qs('#tcNavigator canvas');
    if (!cnv) return;
    var r = cnv.getBoundingClientRect();
    var x = clamp(ev.clientX - r.left, 0, r.width);
    var y = clamp(ev.clientY - r.top, 0, r.height);
    var ms = mapState('all');
    var p = fromMap(x * (234 / r.width), y * (150 / r.height), ms);
    centerAt(p.x, p.y);
  }
  function centerAt(x, y){
    var cv = canvas();
    if (!cv) return;
    var z = scale();
    cv.scrollTo({
      left: clamp(x * z - cv.clientWidth / 2, 0, Math.max(0, cv.scrollWidth - cv.clientWidth)),
      top: clamp(y * z - cv.clientHeight / 2, 0, Math.max(0, cv.scrollHeight - cv.clientHeight)),
      behavior: 'auto'
    });
    scheduleRender();
  }
  function setZoomPercent(percent){
    var z = zoomInput();
    if (z){
      z.value = String(clamp(Math.round(percent), toInt(z.min, 50), toInt(z.max, 200)));
      z.dispatchEvent(new Event('input', {bubbles:true}));
    } else {
      window.ZSCALE = clamp(percent / 100, .5, 2);
      var st = stage();
      if (st) st.style.transform = 'scale(' + window.ZSCALE + ')';
    }
  }
  function fitTo(kind){
    var rect = unionRect(contentRects(kind || 'all'));
    if (!rect) return false;
    rect = padRect(rect, 140);
    var cv = canvas();
    if (!cv) return false;
    var percent = Math.min((cv.clientWidth / rect.w) * 100, (cv.clientHeight / rect.h) * 100);
    setZoomPercent(percent);
    setTimeout(function(){ centerAt(rect.x + rect.w / 2, rect.y + rect.h / 2); render(); }, 0);
    return true;
  }
  function drawRect(ctx, r, color, fill){
    ctx.strokeStyle = color;
    ctx.fillStyle = fill || color;
    ctx.lineWidth = 1;
    ctx.globalAlpha = fill ? .9 : 1;
    if (fill) ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.globalAlpha = 1;
    ctx.strokeRect(r.x, r.y, r.w, r.h);
  }
  function render(){
    var panel = ensurePanel();
    var cnv = panel && qs('canvas', panel);
    if (!cnv) return;
    var ctx = cnv.getContext('2d');
    var ms = mapState('all');
    ctx.clearRect(0, 0, cnv.width, cnv.height);
    ctx.fillStyle = 'rgba(5,10,18,.72)';
    ctx.fillRect(0, 0, cnv.width, cnv.height);
    projectRects().forEach(function(r){ drawRect(ctx, toMap(r, ms), 'rgba(125,151,255,.34)', 'rgba(125,151,255,.08)'); });
    bucketRects().forEach(function(r){ drawRect(ctx, toMap(r, ms), 'rgba(242,184,75,.34)', 'rgba(242,184,75,.07)'); });
    taskRects().forEach(function(r){ drawRect(ctx, toMap(r, ms), 'rgba(97,208,255,.74)', 'rgba(97,208,255,.20)'); });
    noteRects().forEach(function(r){ drawRect(ctx, toMap(r, ms), 'rgba(242,184,75,.82)', 'rgba(242,184,75,.22)'); });
    var vp = viewportRect();
    if (vp){
      var mv = toMap(vp, ms);
      ctx.lineWidth = 2;
      ctx.strokeStyle = 'rgba(255,255,255,.92)';
      ctx.strokeRect(mv.x, mv.y, mv.w, mv.h);
    }
    var meta = qs('.tcNavigatorMeta', panel);
    if (meta) meta.textContent = taskRects().filter(Boolean).length + ' tasks, ' + noteRects(true).filter(Boolean).length + ' notes';
    var hasSelection = selectedRects().filter(Boolean).length > 0;
    var selBtn = qs('[data-fit="selection"]', panel);
    if (selBtn) selBtn.disabled = !hasSelection;
  }
  var renderTimer = 0;
  function scheduleRender(){
    if (renderTimer) return;
    renderTimer = setTimeout(function(){
      renderTimer = 0;
      render();
    }, 80);
  }
  function install(){
    if (install.done){
      scheduleRender();
      return;
    }
    install.done = true;
    ensurePanel();
    render();
    var cv = canvas();
    if (cv) cv.addEventListener('scroll', scheduleRender, {passive:true});
    var z = zoomInput();
    if (z) z.addEventListener('input', scheduleRender);
    var st = stage();
    if (st && window.MutationObserver){
      var mo = new MutationObserver(function(records){
        for (var i=0;i<records.length;i++){
          var r = records[i], t = r.target;
          if (r.type === 'attributes' && t && t.classList && (t.classList.contains('node') || t.classList.contains('tcNoteNode') || t.classList.contains('tcNoteBucket') || t.classList.contains('projArea') || t.classList.contains('tagArea'))){
            scheduleRender(); return;
          }
          if (r.type === 'childList'){
            for (var a=0;a<r.addedNodes.length;a++){
              var n = r.addedNodes[a];
              if (n && n.nodeType === 1 && ((n.matches && n.matches('.node,.tcNoteNode,.tcNoteBucket,.projArea,.tagArea')) || (n.querySelector && n.querySelector('.node,.tcNoteNode,.tcNoteBucket,.projArea,.tagArea')))){ scheduleRender(); return; }
            }
            for (var d=0;d<r.removedNodes.length;d++){
              var m = r.removedNodes[d];
              if (m && m.nodeType === 1 && ((m.matches && m.matches('.node,.tcNoteNode,.tcNoteBucket,.projArea,.tagArea')) || (m.querySelector && m.querySelector('.node,.tcNoteNode,.tcNoteBucket,.projArea,.tagArea')))){ scheduleRender(); return; }
            }
          }
        }
      });
      mo.observe(st, {subtree:true, childList:true, attributes:true, attributeFilter:['class','style','transform']});
    }
    document.addEventListener('mouseup', scheduleRender, true);
  }
  window.TaskCanvasNavigator = {
    render: render,
    fitTo: fitTo,
    centerAt: centerAt,
    viewportRect: viewportRect,
    mapState: mapState
  };
  window.addEventListener('load', function(){ setTimeout(install, 180); });
  document.addEventListener('twdata', function(){ setTimeout(install, 60); });
})();</script>
