  function hexToRgb(hex){

    var rects = bucketNames().map(bucketVisualRect).filter(Boolean);
    if (rects.length < 2) return false;
    rects.sort(function(a, b){ return (a.y - b.y) || (a.x - b.x); });
    var changed = false;
    var gap = 32;
    for (var iter = 0; iter < 20; iter++){
      var moved = false;
      for (var i = 0; i < rects.length; i++){
        for (var j = i + 1; j < rects.length; j++){
          var a = rects[i], b = rects[j];
          if (!rectsOverlap(a, b)) continue;
          var right = (a.x + a.w + gap) - b.x;
          var down = (a.y + a.h + gap) - b.y;
          var dx = 0, dy = 0;
          if (right > 0 && down > 0){
            if (right < down) dx = Math.ceil(right);
            else dy = Math.ceil(down);
          } else if (right > 0) dx = Math.ceil(right);
          else if (down > 0) dy = Math.ceil(down);
          if (!dx && !dy) continue;
          if (moveBucketForSeparation(b.bucket, dx, dy)){
            b.x += dx;
            b.y += dy;
            moved = true;
            changed = true;
          }
        }
      }
      if (!moved) break;
    }
    if (changed) saveBucketLayoutState();
    return changed;
  }

      var dx = slot.x - rect.x;

      moveBucketNotes(bucket, dx, dy);
      var layout = bucketLayout(bucket);
      layout.dx = 0;
      layout.dy = 0;
      changed = true;
      rect = bucketVisualRect(bucket) || rect;
      placedRects.push(rect);
    });
    renderAll();
    saveBucketLayoutState();
    saveSoon();
    return changed;
  }
  function reflowMindMap(preferredRootId){
    if (!notes.length) return;
    var roots = [];
    if (preferredRootId && noteById(preferredRootId)) roots.push(noteById(preferredRootId));
    notes.forEach(function(n){ if (roots.indexOf(n) === -1 && !hasChildParent(n.id)) roots.push(n); });
    var rootY = roots.length === 1 ? toInt(roots[0].y, 180) : 140;
    roots.forEach(function(root, idx){
      var slots = subtreeSlots(root.id, {});
      var y = idx === 0 && roots.length === 1 ? rootY : rootY + idx * Math.max(180, slots * 132);
      placeSubtree(root.id, toInt(root.x, 160), y, {});
    });
    renderAll();
    saveSoon();
  }
  function renderAll(){
    qsa('.tcNoteNode').forEach(function(el){ el.remove(); });
    notes.forEach(renderNote);
    syncNoteLabels();
    updateNoteSearch();
    if (selectedNoteId) syncSelection();
    applyVisibility();
    resolveNoteOverlaps();
    renderBuckets();
    renderLinks();
  }
  function installCanvasClick(){
    var st = stage(); if (!st || st.__notesClick) return;
    st.__notesClick = true;
    st.addEventListener('click', function(ev){
      if (!noteMode) return;
      if (ev.target.closest('.node, .tcNoteNode, .projAreaLabel, .tagAreaLabel, .depHandle')) return;
      var p = screenToStage(ev.clientX, ev.clientY);
      createNote(p.x, p.y, '', '', null, { preservePosition: true });
      noteMode = false;
      syncButtons();
      ev.preventDefault();
      ev.stopPropagation();
    }, true);
  }
  function installTaskLinking(){
    if (document.__notesTaskLinking) return;
    document.__notesTaskLinking = true;
    document.addEventListener('mousedown', function(ev){
      var pop = document.getElementById('tcNoteTaskPopover');
      if (!pop) return;
      if (ev.target && ev.target.closest && ev.target.closest('#tcNoteTaskPopover, .tcNoteTaskBadge')) return;
      closeNoteTaskPopover();
    }, true);
    document.addEventListener('mousedown', function(ev){
      if (!taskLinkMode) return;
      var target = ev.target && ev.target.closest ? ev.target.closest('.node[data-short], .item[data-short]') : null;
      if (!target) return;
      var noteId = selectedNoteId;
      var ref = taskRefFromElement(target);
      if (noteId && ref){
        linkNoteToTask(noteId, ref);
        taskLinkMode = false;
        syncButtons();
        syncNoteTaskBadges();
        selectNote(noteId);
        ev.preventDefault();
        ev.stopPropagation();
      }
    }, true);
  }
  function installLassoSelection(){
    var st = stage(); if (!st || st.__notesLasso) return;
    st.__notesLasso = true;
    st.addEventListener('mousedown', function(ev){
      if (ev.button !== 0 || noteMode || linkMode) return;
      if (ev.target.closest('.tcNoteNode, .node, .projAreaLabel, .tagAreaLabel, .tagAddBtn, .depHandle')) return;
      var start = screenToStage(ev.clientX, ev.clientY);
      lasso = {sx:start.x, sy:start.y, x:start.x, y:start.y, active:false, additive:!!(ev.shiftKey || ev.ctrlKey || ev.metaKey)};
    }, true);
    document.addEventListener('mousemove', function(ev){
      if (!lasso) return;
      var p = screenToStage(ev.clientX, ev.clientY);
      var dx = p.x - lasso.sx, dy = p.y - lasso.sy;
      if (!lasso.active && Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
      if (!lasso.active){
        lasso.active = true;
        lasso.el = document.createElement('div');
        lasso.el.className = 'tcNoteMarquee';
        stage().appendChild(lasso.el);
      }
      lasso.x = Math.min(lasso.sx, p.x);
      lasso.y = Math.min(lasso.sy, p.y);
      lasso.w = Math.abs(dx);
      lasso.h = Math.abs(dy);
      lasso.el.style.left = lasso.x + 'px';
      lasso.el.style.top = lasso.y + 'px';
      lasso.el.style.width = lasso.w + 'px';
      lasso.el.style.height = lasso.h + 'px';
    }, true);
    document.addEventListener('mouseup', function(){
      if (!lasso) return;
      if (lasso.active){
        var box = {x:lasso.x, y:lasso.y, w:lasso.w, h:lasso.h};
        var ids = [];
        qsa('.tcNoteNode').forEach(function(el){
          if (el.style.display === 'none') return;
          var id = el.getAttribute('data-note-id');
          var nr = {x:toInt(el.style.left, 0), y:toInt(el.style.top, 0), w:el.offsetWidth, h:el.offsetHeight};
          if (rectsOverlap(box, nr)) ids.push(id);
        });
        selectNotes(ids, lasso.additive);
        if (lasso.el) lasso.el.remove();
      }
      lasso = null;
    }, true);
  }
  function wrapDrawLinks(){
    if (window.drawLinks && !window.drawLinks.__notesWrapped){
      var orig = window.drawLinks;
      window.drawLinks = function(){
        var rv = orig.apply(this, arguments);
        try{ renderLinks(); }catch(_){}
        return rv;
      };
      window.drawLinks.__notesWrapped = true;
    }
  }
  function installKeyboardShortcuts(){
    if (document.__notesKeyboard) return;
    document.__notesKeyboard = true;
    document.addEventListener('mousemove', updateLinkDrag, true);
    document.addEventListener('mouseup', finishLinkDrag, true);
    document.addEventListener('keydown', function(ev){
      if (ev.altKey || ev.ctrlKey || ev.metaKey || ev.shiftKey) return;
      if (ev.target && ev.target.closest && ev.target.closest('input, textarea, select')) return;
      if (ev.target && ev.target.closest && ev.target.closest('[contenteditable="true"]') && !ev.target.closest('.tcNoteText')) return;
      if ((ev.key === 'Delete' || ev.key === 'Backspace') && selectedLinkKey){
        ev.preventDefault();
        deleteSelectedLink();
        return;
      }
      if (!selectedNoteId || !noteById(selectedNoteId)) return;
      if (ev.key === 'Tab'){
        ev.preventDefault();
        createChildNote(selectedNoteId, null, null, selectedNoteId);
      } else if (ev.key === 'Enter'){
        ev.preventDefault();
        createSiblingNote(selectedNoteId);
      } else if (ev.key === 'Delete' || ev.key === 'Backspace'){
        if (ev.target && ev.target.closest && ev.target.closest('[contenteditable="true"]')) return;
        ev.preventDefault();
        deleteSelectedNotes();
      }
    });
  }
  function exportData(){
    var bucketData = {};
    bucketNames().forEach(function(bucket){
      var layout = bucketLayoutState[bucket] || {dx:0, dy:0};
      bucketData[bucket] = {
        dx: toInt(layout.dx, 0),
        dy: toInt(layout.dy, 0),
        collapsed: !!bucketUiState[bucket],
        followNotes: bucketFollowsNotes(bucket),
        color: bucketColor(bucket)
      };
    });
    return {
      kind: 'taskcanvas.notes',
      version: 1,
      exportedAt: new Date().toISOString(),
      notes: notes.map(function(n){
        var row = {id:n.id, x:toInt(n.x, 160), y:toInt(n.y, 160), content:n.content || 'New note', bucket:noteBucket(n), collapsed:!!n.collapsed, taskRefs:noteTaskRefs(n).slice()};
        if (n.color) row.color = n.color;
        return row;
      }),
      links: links.map(function(l){
        return {from:l.from, to:l.to, type:l.type || 'manual'};
      }),
      buckets: bucketData
    };
  }
  function exportJSON(){
    return JSON.stringify(exportData(), null, 2);
  }
  function downloadExport(){
    var text = exportJSON();
    var blob = new Blob([text], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'taskcanvas-notes.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 0);
  }
  function importData(data){
    if (typeof data === 'string') data = JSON.parse(data);
    if (!data || !Array.isArray(data.notes)) throw new Error('Import file must contain a notes array');
    var nextNotes = data.notes.map(normalizeNote);
    var ids = {};
    nextNotes.forEach(function(n){
      while (ids[n.id]) n.id = uid();
      ids[n.id] = true;
    });
    var sanitized = sanitizeLinks(data.links, ids);
    var nextLinks = sanitized.links;
    notes = nextNotes;
    links = nextLinks;
    bucketUiState = Object.create(null);
    bucketLayoutState = Object.create(null);
    bucketFollowState = Object.create(null);
    bucketColorState = Object.create(null);
    if (data.buckets && typeof data.buckets === 'object'){
      Object.keys(data.buckets).forEach(function(bucket){
        var entry = data.buckets[bucket] || {};
        bucket = bucketText(bucket);
        bucketUiState[bucket] = !!entry.collapsed;
        bucketLayoutState[bucket] = {
          dx: toInt(entry.dx, 0),
          dy: toInt(entry.dy, 0)
        };
        bucketFollowState[bucket] = entry.followNotes !== false;
        if (entry.color) bucketColorState[bucket] = String(entry.color).trim();
      });
    }
    selectedNoteId = null;
    selectedNoteIds = {};
    selectedLinkKey = null;
    renderAll();
    saveNow();
    return {notes:notes.length, links:links.length, droppedLinks:sanitized.dropped, droppedChildLinks:sanitized.droppedChild};
  }
  function importJSON(text){
    return importData(text);
  }
  function stageSelectedNotesAsTasks(){
    var ids = selectedIds();
    if (!ids.length && selectedNoteId) ids = [selectedNoteId];
    ids = ids.filter(function(id){ return !!noteById(id); });
    if (!ids.length) return 0;
    var A = window.STAGED_CMDS = Array.isArray(window.STAGED_CMDS) ? window.STAGED_CMDS : [];
    window.__NOTE_TASK_CMD_BY_ID__ = window.__NOTE_TASK_CMD_BY_ID__ || {};
    ids.forEach(function(id){
      var old = window.__NOTE_TASK_CMD_BY_ID__[id];
      if (old){
        for (var i=A.length-1;i>=0;i--) if (A[i] === old) A.splice(i, 1);
      }
      var n = noteById(id);
      var cmd = 'task add ' + commandText(n && n.content);
      window.__NOTE_TASK_CMD_BY_ID__[id] = cmd;
      A.push(cmd);
    });
    try{ if (typeof updateConsole === 'function') updateConsole(); }catch(_){}
    return ids.length;
  }
  function createLinkedTasksFromSelectedNotes(){
    var ids = selectedIds();
    if (!ids.length && selectedNoteId) ids = [selectedNoteId];
    ids = ids.filter(function(id){ return !!noteById(id); });
    if (!ids.length) return 0;
    var A = window.STAGED_CMDS = Array.isArray(window.STAGED_CMDS) ? window.STAGED_CMDS : [];
    window.__NOTE_LINKED_TASK_CMD_BY_ID__ = window.__NOTE_LINKED_TASK_CMD_BY_ID__ || {};
    var count = 0;
    ids.forEach(function(id){
      var n = noteById(id);
      if (!n) return;
      var ref = generatedTaskRefForNote(n);
      if (!ref) return;
      linkNoteToTask(id, ref);
      var old = window.__NOTE_LINKED_TASK_CMD_BY_ID__[id];
      if (old){
        for (var i=A.length-1;i>=0;i--) if (A[i] === old) A.splice(i, 1);
      }
      var cmd = 'task add ' + commandText(n.content || ref.desc || 'New note task');
      window.__NOTE_LINKED_TASK_CMD_BY_ID__[id] = cmd;
      A.push(cmd);
      count++;
    });
    syncNoteTaskBadges();
    try{ if (typeof updateConsole === 'function') updateConsole(); }catch(_){}
    saveSoon();
    return count;
  }
  function setBucket(id, bucket){
    var n = noteById(id);
    if (!n) return false;
    n.bucket = bucketText(bucket);
    renderAll();
    saveSoon();
    return true;
  }
  function boot(){
    ensureToolbar();
    loadState();
    loadBucketState();
    loadBucketLayoutState();
    loadBucketFollowState();
    loadBucketColorState();
    renderAll();
    installCanvasClick();
    installTaskLinking();
    installLassoSelection();
    installKeyboardShortcuts();
    wrapDrawLinks();
    try{ renderLinks(); }catch(_){}
    if (pendingRepairFeedback){
      noteFeedback(pendingRepairFeedback);
      pendingRepairFeedback = null;
    }
  }
  window.TaskCanvasNotes = {
    createNote: createNote,
    createChildNote: createChildNote,
    createSiblingNote: createSiblingNote,
    deleteSelectedNotes: deleteSelectedNotes,
    exportData: exportData,
    exportJSON: exportJSON,
    importData: importData,
    importJSON: importJSON,
    stageSelectedNotesAsTasks: stageSelectedNotesAsTasks,
    createLinkedTasksFromSelectedNotes: createLinkedTasksFromSelectedNotes,
    linkNotes: function(from, to, type){
      if (!addNoteLink(from, to, type || 'manual')) return false;
      syncNoteLabels();
      renderLinks();
      saveSoon();
      return true;
    },
    linkSelectedNotes: linkSelectedNotes,
    selectLink: selectLink,
    deleteSelectedLink: deleteSelectedLink,
    reflowMindMap: reflowMindMap,
    compactMindMap: compactMindMap,
    toggleCollapse: toggleCollapse,
    setBucket: setBucket,
    setBucketColor: setBucketColor,
    setNoteColor: setNoteColor,
    bucketPalette: function(){ return bucketPalette.slice(); },
    setContent: setNoteContent,
    selectNote: selectNote,
    clearSelection: clearNoteSelection,
    primaryNote: function(){ return selectedNoteId; },
    selectedNotes: function(){ return selectedIds(); },
    selectionSnapshot: noteSelectionSnapshot,
    notes: function(){ return notes.slice(); },
    noteSpaceRects: noteSpaceRects,
    outline: noteOutline,
    links: function(){ return links.slice(); },
    noteLabels: function(){ return syncNoteLabels(); },
    searchNotes: function(query){ return searchNotes(query).map(function(n){ return n.id; }); },
    makeSpaceForRects: makeSpaceForRects,
    focusSearchResult: focusSearchResult,
    linkNoteToTask: linkNoteToTask,
    unlinkNoteTask: unlinkNoteTask,
    linkedTasks: function(noteId){ return noteTaskRefs(noteById(noteId)).slice(); },
    highlightLinkedTasks: highlightLinkedTasks,
    render: renderAll,
    save: saveNow
  };
  window.addEventListener('load', function(){ setTimeout(boot, 120); });
  document.addEventListener('twdata', function(){ setTimeout(boot, 0); });
})();</script>
