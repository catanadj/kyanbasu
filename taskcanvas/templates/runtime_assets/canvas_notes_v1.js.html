<script id="FEATURE_CANVAS_NOTES_V1">(function(){
  if (window.__FEATURE_CANVAS_NOTES_V1__) return; window.__FEATURE_CANVAS_NOTES_V1__ = true;

  var notes = [];
  var links = [];
  var noteMode = false;
  var linkMode = false;
  var linkFrom = null;
  var selectedNoteId = null;
  var selectedNoteIds = {};
  var saveTimer = 0;
  var lasso = null;
  var bucketDrag = null;

  function qs(s, root){ return (root || document).querySelector(s); }
  function qsa(s, root){ return Array.prototype.slice.call((root || document).querySelectorAll(s)); }
  function escAttr(v){ return String(v || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"'); }
  function stage(){ return document.getElementById('builderStage'); }
  function canvas(){ return qs('#builderWrap .canvas'); }
  function toInt(v, d){ var n = parseInt(v, 10); return isFinite(n) ? n : d; }
  function key(){
    var seed = 'fallback';
    try{
      if (window.DATA && Array.isArray(DATA.tasks)){
        seed = DATA.tasks.map(function(t){ return t && (t.uuid || t.short || t.desc || ''); }).join('|').slice(0, 240) || 'empty';
      } else if (location && location.pathname) {
        seed = location.pathname;
      }
    }catch(_){}
    return 'taskcanvas:notes:v1:' + seed;
  }
  function uid(){ return 'note-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7); }
  function noteById(id){
    for (var i=0;i<notes.length;i++) if (notes[i].id === id) return notes[i];
    return null;
  }
  function noteBucket(n){
    return bucketText(n && n.bucket);
  }
  function bucketNames(){
    var seen = Object.create(null);
    var list = [];
    notes.forEach(function(n){
      var bucket = noteBucket(n);
      if (!seen[bucket]){
        seen[bucket] = true;
        list.push(bucket);
      }
    });
    list.sort(function(a, b){
      if (a === '(no bucket)') return -1;
      if (b === '(no bucket)') return 1;
      return a.localeCompare(b);
    });
    return list;
  }
  function renameBucket(oldBucket, nextBucket){
    oldBucket = bucketText(oldBucket);
    nextBucket = bucketText(nextBucket);
    if (oldBucket === nextBucket) return false;
    var changed = false;
    notes.forEach(function(n){
      if (noteBucket(n) === oldBucket){
        n.bucket = nextBucket;
        changed = true;
      }
    });
    if (changed) renderAll();
    return changed;
  }
  function linkExists(from, to){
    return links.some(function(l){ return l && l.from === from && l.to === to; });
  }
  function childLinksFrom(id){
    return links.filter(function(l){ return l && l.type === 'child' && l.from === id && noteById(l.to); });
  }
  function hasChildParent(id){
    return links.some(function(l){ return l && l.type === 'child' && l.to === id && noteById(l.from); });
  }
  function parentLinkFor(id){
    for (var i=0;i<links.length;i++){
      if (links[i] && links[i].type === 'child' && links[i].to === id && noteById(links[i].from)) return links[i];
    }
    return null;
  }
  function noteText(title, body){
    var a = String(title || '').trim();
    var b = String(body || '').trim();
    if (a && b) return a + '\n' + b;
    return a || b || 'New note';
  }
  function commandText(s){
    return String(s || '').replace(/\s+/g, ' ').trim() || 'New note';
  }
  function bucketText(bucket){
    var text = String(bucket || '').trim();
    return text || '(no bucket)';
  }
  function normalizeNote(n){
    n = n || {};
    if (!n.id) n.id = uid();
    if (!n.content) n.content = noteText(n.title, n.body);
    delete n.title;
    delete n.body;
    n.x = toInt(n.x, 160);
    n.y = toInt(n.y, 160);
    n.bucket = bucketText(n.bucket);
    n.collapsed = !!n.collapsed;
    return n;
  }
  function saveSoon(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNow, 180);
  }
  function saveNow(){
    try{ localStorage.setItem(key(), JSON.stringify({notes:notes, links:links})); }catch(_){}
  }
  function loadState(){
    try{
      var raw = localStorage.getItem(key());
      if (!raw) return;
      var parsed = JSON.parse(raw);
      notes = Array.isArray(parsed.notes) ? parsed.notes : [];
      notes = notes.map(normalizeNote);
      links = Array.isArray(parsed.links) ? parsed.links : [];
      links.forEach(function(l){ if (l && !l.type) l.type = 'manual'; });
    }catch(_){ notes = []; links = []; }
  }
  function screenToStage(clientX, clientY){
    var st = stage(), cv = canvas();
    if (!st || !cv) return {x: 120, y: 120};
    var r = st.getBoundingClientRect();
    var scale = window.ZSCALE || 1;
    return {x: Math.max(0, (clientX - r.left) / scale), y: Math.max(0, (clientY - r.top) / scale)};
  }
  function centerPoint(el){
    var st = stage();
    if (!el || !st) return {x: 0, y: 0};
    return {
      x: toInt(el.style.left, 0) + el.offsetWidth / 2,
      y: toInt(el.style.top, 0) + el.offsetHeight / 2
    };
  }
  function rectsOverlap(a, b){
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }
  function bucketFromPoint(x, y){
    var el = document.elementFromPoint(x, y);
    while (el && el !== stage()){
      if (el.classList && el.classList.contains('tcNoteBucket')) return el.getAttribute('data-bucket') || '(no bucket)';
      el = el.parentNode;
    }
    return null;
  }
  function bucketAtStagePoint(x, y){
    var found = null;
    qsa('.tcNoteBucket').forEach(function(el){
      var left = toInt(el.style.left, 0);
      var top = toInt(el.style.top, 0);
      var width = toInt(el.style.width, 0);
      var height = toInt(el.style.height, 0);
      if (x >= left && x <= left + width && y >= top && y <= top + height){
        found = el.getAttribute('data-bucket') || '(no bucket)';
      }
    });
    return found;
  }
  function ensureToolbar(){
    if (document.getElementById('noteModeBtn')) return;
    var anchor = document.getElementById('toggleConsole') || document.getElementById('copyBtn');
    var parent = anchor && anchor.parentNode;
    if (!parent) return;
    var noteBtn = document.createElement('button');
    noteBtn.id = 'noteModeBtn';
    noteBtn.className = 'btn ghost';
    noteBtn.type = 'button';
    noteBtn.textContent = 'Note';
    noteBtn.title = 'Click the canvas to add a planning note';
    var linkBtn = document.createElement('button');
    linkBtn.id = 'noteLinkModeBtn';
    linkBtn.className = 'btn ghost';
    linkBtn.type = 'button';
    linkBtn.textContent = 'Link notes';
    linkBtn.title = 'Select two notes to link them';
    var reflowBtn = document.createElement('button');
    reflowBtn.id = 'noteReflowBtn';
    reflowBtn.className = 'btn ghost';
    reflowBtn.type = 'button';
    reflowBtn.textContent = 'Reflow map';
    reflowBtn.title = 'Arrange planning notes as a mind map';
    var exportBtn = document.createElement('button');
    exportBtn.id = 'noteExportBtn';
    exportBtn.className = 'btn ghost';
    exportBtn.type = 'button';
    exportBtn.textContent = 'Export notes';
    exportBtn.title = 'Export planning notes as JSON';
    var importBtn = document.createElement('button');
    importBtn.id = 'noteImportBtn';
    importBtn.className = 'btn ghost';
    importBtn.type = 'button';
    importBtn.textContent = 'Import notes';
    importBtn.title = 'Import planning notes from JSON';
    var createTasksBtn = document.createElement('button');
    createTasksBtn.id = 'noteCreateTasksBtn';
    createTasksBtn.className = 'btn ghost';
    createTasksBtn.type = 'button';
    createTasksBtn.textContent = 'Create tasks';
    createTasksBtn.title = 'Stage Taskwarrior add commands for selected notes';
    var importInput = document.createElement('input');
    importInput.id = 'noteImportInput';
    importInput.type = 'file';
    importInput.accept = 'application/json,.json';
    importInput.style.display = 'none';
    parent.insertBefore(importInput, anchor.nextSibling);
    parent.insertBefore(importBtn, importInput);
    parent.insertBefore(exportBtn, importBtn);
    parent.insertBefore(createTasksBtn, exportBtn);
    parent.insertBefore(reflowBtn, anchor.nextSibling);
    parent.insertBefore(linkBtn, reflowBtn);
    parent.insertBefore(noteBtn, linkBtn);
    noteBtn.addEventListener('click', function(){
      noteMode = !noteMode;
      if (noteMode) linkMode = false;
      syncButtons();
    });
    linkBtn.addEventListener('click', function(){
      linkMode = !linkMode;
      if (linkMode) noteMode = false;
      linkFrom = null;
      syncButtons();
    });
    reflowBtn.addEventListener('click', function(){
      reflowMindMap();
    });
    exportBtn.addEventListener('click', function(){
      downloadExport();
    });
    importBtn.addEventListener('click', function(){
      importInput.value = '';
      importInput.click();
    });
    createTasksBtn.addEventListener('click', function(){
      var count = stageSelectedNotesAsTasks();
      if (!count && window.alert) window.alert('Select one or more notes first.');
    });
    importInput.addEventListener('change', function(){
      var file = importInput.files && importInput.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(){
        try{
          if (notes.length && window.confirm && !window.confirm('Replace current planning notes with imported notes?')) return;
          importJSON(String(reader.result || ''));
        }catch(e){
          window.alert && window.alert('Could not import notes: ' + (e && e.message ? e.message : String(e)));
        }
      };
      reader.readAsText(file);
    });
  }
  function syncButtons(){
    var noteBtn = document.getElementById('noteModeBtn');
    var linkBtn = document.getElementById('noteLinkModeBtn');
    if (noteBtn) noteBtn.classList.toggle('active', !!noteMode);
    if (linkBtn) linkBtn.classList.toggle('active', !!linkMode);
  }
  function createNote(x, y, title, body){
    var bucket = arguments.length > 4 ? arguments[4] : null;
    var n = {id: uid(), x: toInt(x, 160), y: toInt(y, 160), content: noteText(title, body), bucket: bucketText(bucket), collapsed: false};
    notes.push(n);
    renderNote(n);
    renderBuckets();
    selectNote(n.id);
    renderLinks();
    saveSoon();
    return n;
  }
  function renderNote(n){
    var st = stage(); if (!st || !n) return null;
    var el = document.querySelector('.tcNoteNode[data-note-id="'+escAttr(n.id)+'"]');
    if (!el){
      el = document.createElement('div');
      el.className = 'tcNoteNode';
      el.setAttribute('data-note-id', n.id);
      el.innerHTML =
        '<div class="tcNoteHead"><button type="button" class="tcNoteBucketLabel" title="Edit bucket"></button><div class="tcNoteActions"><button type="button" data-note-collapse title="Collapse branch">v</button><button type="button" data-note-child title="Add child note">+</button><button type="button" data-note-link title="Link from this note">L</button><button type="button" data-note-delete title="Delete selected notes">x</button></div></div>' +
        '<div class="tcNoteText" contenteditable="true"></div>';
      st.appendChild(el);
      wireNote(el);
    }
    el.style.left = toInt(n.x, 160) + 'px';
    el.style.top = toInt(n.y, 160) + 'px';
    el.classList.toggle('collapsed', !!n.collapsed);
    el.setAttribute('data-bucket', noteBucket(n));
    var bucketLabel = qs('.tcNoteBucketLabel', el);
    if (bucketLabel){
      bucketLabel.textContent = noteBucket(n);
      bucketLabel.title = 'Edit bucket (' + noteBucket(n) + ')';
    }
    qs('.tcNoteText', el).textContent = n.content || 'New note';
    syncCollapseButton(n);
    return el;
  }
  function syncCollapseButton(n){
    var el = document.querySelector('.tcNoteNode[data-note-id="'+escAttr(n.id)+'"]');
    var btn = el && qs('[data-note-collapse]', el);
    if (!btn) return;
    var hasKids = childLinksFrom(n.id).length > 0;
    btn.disabled = !hasKids;
    btn.textContent = n.collapsed ? '>' : 'v';
    btn.title = n.collapsed ? 'Expand branch' : 'Collapse branch';
  }
  function wireNote(el){
    var id = el.getAttribute('data-note-id');
    var text = qs('.tcNoteText', el);
    text.addEventListener('input', function(){ var n = noteById(id); if (n){ n.content = text.textContent.trim() || 'New note'; saveSoon(); }});
    qs('.tcNoteBucketLabel', el).addEventListener('click', function(ev){
      ev.preventDefault(); ev.stopPropagation();
      editBucket(id);
    });
    el.addEventListener('mousedown', function(ev){
      if (ev.button !== 0 || ev.target.closest('button')) return;
      if (ev.target.closest('.tcNoteBucketLabel')) return;
      if (!(ev.shiftKey || ev.ctrlKey || ev.metaKey)) return;
      selectNote(id, true);
      ev.preventDefault();
      ev.stopPropagation();
    }, true);
    el.addEventListener('click', function(ev){
      ev.stopPropagation();
      if (ev.shiftKey || ev.ctrlKey || ev.metaKey) return;
      selectNote(id, !!(ev.ctrlKey || ev.metaKey || ev.shiftKey));
      if (linkMode && !ev.target.closest('[contenteditable="true"]')){
        handleLinkClick(id);
      }
    });
    qs('[data-note-delete]', el).addEventListener('click', function(ev){
      ev.preventDefault(); ev.stopPropagation();
      if (selectedNoteIds[id] && selectedIds().length > 1) deleteSelectedNotes();
      else deleteNote(id);
    });
    qs('[data-note-link]', el).addEventListener('click', function(ev){
      ev.preventDefault(); ev.stopPropagation();
      linkMode = true; noteMode = false; syncButtons(); handleLinkClick(id);
    });
    qs('[data-note-child]', el).addEventListener('click', function(ev){
      ev.preventDefault(); ev.stopPropagation();
      createChildNote(id);
    });
    qs('[data-note-collapse]', el).addEventListener('click', function(ev){
      ev.preventDefault(); ev.stopPropagation();
      toggleCollapse(id);
    });
    makeNoteDraggable(el);
  }
  function makeNoteDraggable(el){
    var dragging=false, sx=0, sy=0, start=[];
    qs('.tcNoteHead', el).addEventListener('mousedown', function(ev){
      if (ev.button !== 0 || ev.target.closest('button')) return;
      dragging = true;
      sx = ev.clientX; sy = ev.clientY;
      var id = el.getAttribute('data-note-id');
      var additive = !!(ev.ctrlKey || ev.metaKey || ev.shiftKey);
      if (!selectedNoteIds[id] || additive) selectNote(id, additive);
      var ids = selectedNoteIds[id] ? selectedIds() : [id];
      start = ids.map(function(noteId){
        var node = document.querySelector('.tcNoteNode[data-note-id="'+escAttr(noteId)+'"]');
        return node ? {id:noteId, el:node, x:toInt(node.style.left, 0), y:toInt(node.style.top, 0)} : null;
      }).filter(Boolean);
      ev.preventDefault(); ev.stopPropagation();
    });
    document.addEventListener('mousemove', function(ev){
      if (!dragging) return;
      var scale = window.ZSCALE || 1;
      var dx = (ev.clientX - sx) / scale;
      var dy = (ev.clientY - sy) / scale;
      start.forEach(function(sp){
        var nx = Math.max(0, (sp.x + dx)|0);
        var ny = Math.max(0, (sp.y + dy)|0);
        sp.el.style.left = nx + 'px';
        sp.el.style.top = ny + 'px';
        var n = noteById(sp.id);
        if (n){ n.x = nx; n.y = ny; }
      });
      renderBuckets();
      renderLinks();
    });
    document.addEventListener('mouseup', function(){
      if (!dragging) return;
      dragging = false;
      var bucketChanged = false;
      start.forEach(function(sp){
        var n = noteById(sp.id);
        if (!n) return;
        var finalX = toInt(sp.el.style.left, sp.x);
        var finalY = toInt(sp.el.style.top, sp.y);
        var centerX = finalX + (sp.el.offsetWidth || 220) / 2;
        var centerY = finalY + (sp.el.offsetHeight || 92) / 2;
        var bucket = bucketAtStagePoint(centerX, centerY);
        if (bucket && bucket !== noteBucket(n)){
          n.bucket = bucket;
          bucketChanged = true;
        }
      });
      start = [];
      if (bucketChanged){
        renderAll();
      }
      saveSoon();
    });
  }
  function selectedIds(){
    return Object.keys(selectedNoteIds).filter(function(id){ return !!selectedNoteIds[id] && !!noteById(id); });
  }
  function selectNote(id, additive){
    if (!noteById(id)){
      selectedNoteId = null;
      selectedNoteIds = {};
    } else if (additive) {
      if (selectedNoteIds[id]) delete selectedNoteIds[id];
      else selectedNoteIds[id] = true;
      var ids = selectedIds();
      selectedNoteId = ids.length ? ids[ids.length - 1] : null;
    } else {
      selectedNoteId = id;
      selectedNoteIds = {};
      selectedNoteIds[id] = true;
    }
    syncSelection();
  }
  function selectNotes(ids, additive){
    if (!additive){
      selectedNoteIds = {};
      selectedNoteId = null;
    }
    ids.forEach(function(id){
      if (noteById(id)){
        selectedNoteIds[id] = true;
        selectedNoteId = id;
      }
    });
    syncSelection();
  }
  function syncSelection(){
    qsa('.tcNoteNode').forEach(function(el){
      el.classList.toggle('selected', !!selectedNoteIds[el.getAttribute('data-note-id')]);
    });
  }
  function focusNoteText(id){
    var el = document.querySelector('.tcNoteNode[data-note-id="'+escAttr(id)+'"] .tcNoteText');
    if (!el) return;
    el.focus();
    try{
      var range = document.createRange();
      range.selectNodeContents(el);
      var sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }catch(_){}
  }
  function handleLinkClick(id){
    if (!linkFrom){
      linkFrom = id;
      selectNote(id);
      return;
    }
    if (linkFrom !== id && !linkExists(linkFrom, id)){
      links.push({from: linkFrom, to: id, type: 'manual'});
      saveSoon();
      renderLinks();
    }
    linkFrom = null;
    linkMode = false;
    syncButtons();
  }
  function deleteNote(id){
    deleteNotes([id]);
  }
  function deleteSelectedNotes(){
    deleteNotes(selectedIds());
  }
  function deleteNotes(ids){
    var doomed = {};
    ids.forEach(function(id){ if (noteById(id)) doomed[id] = true; });
    var doomedIds = Object.keys(doomed);
    if (!doomedIds.length) return;
    notes = notes.filter(function(n){ return !doomed[n.id]; });
    links = links.filter(function(l){ return !doomed[l.from] && !doomed[l.to]; });
    doomedIds.forEach(function(id){ delete selectedNoteIds[id]; });
    if (doomed[selectedNoteId]) selectedNoteId = selectedIds()[0] || null;
    doomedIds.forEach(function(id){
      var el = document.querySelector('.tcNoteNode[data-note-id="'+escAttr(id)+'"]');
      if (el) el.remove();
    });
    syncSelection();
    renderLinks();
    saveSoon();
  }
  function editBucket(id){
    var n = noteById(id);
    if (!n) return false;
    var next = window.prompt ? window.prompt('Bucket name:', noteBucket(n)) : null;
    if (next === null) return false;
    n.bucket = bucketText(next);
    renderAll();
    saveSoon();
    return true;
  }
  function hiddenNoteIds(){
    var hidden = {};
    function hideChildren(id){
      childLinksFrom(id).forEach(function(l){
        if (hidden[l.to]) return;
        hidden[l.to] = true;
        hideChildren(l.to);
      });
    }
    notes.forEach(function(n){ if (n.collapsed) hideChildren(n.id); });
    return hidden;
  }
  function isNoteVisible(id){
    return !hiddenNoteIds()[id];
  }
  function applyVisibility(){
    var hidden = hiddenNoteIds();
    qsa('.tcNoteNode').forEach(function(el){
      el.style.display = hidden[el.getAttribute('data-note-id')] ? 'none' : '';
    });
    notes.forEach(syncCollapseButton);
  }
  function ensureBucketLayer(){
    var st = stage();
    if (!st) return null;
    var layer = document.getElementById('tcNoteBucketsLayer');
    if (!layer){
      layer = document.createElement('div');
      layer.id = 'tcNoteBucketsLayer';
      st.insertBefore(layer, st.firstChild);
    }
    return layer;
  }
  function renderBuckets(){
    var layer = ensureBucketLayer();
    if (!layer) return;
    layer.innerHTML = '';
    var groups = Object.create(null);
    qsa('.tcNoteNode').forEach(function(el){
      if (el.style.display === 'none') return;
      var id = el.getAttribute('data-note-id');
      var n = noteById(id);
      if (!n) return;
      var bucket = noteBucket(n);
      var x = toInt(el.style.left, 0);
      var y = toInt(el.style.top, 0);
      var w = el.offsetWidth || 220;
      var h = el.offsetHeight || 92;
      var g = groups[bucket];
      if (!g){
        g = groups[bucket] = {x:x, y:y, right:x+w, bottom:y+h, count:0};
      }
      g.x = Math.min(g.x, x);
      g.y = Math.min(g.y, y);
      g.right = Math.max(g.right, x + w);
      g.bottom = Math.max(g.bottom, y + h);
      g.count++;
    });
    bucketNames().forEach(function(bucket){
      var g = groups[bucket];
      if (!g) return;
      var box = document.createElement('div');
      box.className = 'tcNoteBucket';
      box.setAttribute('data-bucket', bucket);
      box.style.left = Math.max(0, g.x - 22) + 'px';
      box.style.top = Math.max(0, g.y - 28) + 'px';
      box.style.width = Math.max(260, (g.right - g.x) + 44) + 'px';
      box.style.height = Math.max(120, (g.bottom - g.y) + 44) + 'px';
      box.innerHTML = '<div class="tcNoteBucketHead"><button type="button" class="tcNoteBucketTitle"></button><span class="tcNoteBucketCount"></span></div>';
      var title = qs('.tcNoteBucketTitle', box);
      title.textContent = bucket;
      title.title = 'Rename bucket';
      title.addEventListener('click', function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        var next = window.prompt ? window.prompt('Bucket name:', bucket) : null;
        if (next === null) return;
        renameBucket(bucket, next);
        saveSoon();
      });
      qs('.tcNoteBucketCount', box).textContent = g.count + ' note' + (g.count === 1 ? '' : 's');
      layer.appendChild(box);
    });
  }
  function toggleCollapse(id){
    var n = noteById(id);
    if (!n || childLinksFrom(id).length === 0) return;
    n.collapsed = !n.collapsed;
    renderAll();
    saveSoon();
  }
  function ensureLinkLayer(){
    var svg = document.getElementById('builderLinks');
    if (!svg) return null;
    var layer = document.getElementById('tcNoteLinksLayer');
    if (!layer){
      layer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      layer.id = 'tcNoteLinksLayer';
      svg.appendChild(layer);
    }
    return layer;
  }
  function renderLinks(){
    var layer = ensureLinkLayer();
    if (!layer) return;
    layer.innerHTML = '';
    links.forEach(function(l){
      var a = document.querySelector('.tcNoteNode[data-note-id="'+escAttr(l.from)+'"]');
      var b = document.querySelector('.tcNoteNode[data-note-id="'+escAttr(l.to)+'"]');
      if (!a || !b) return;
      if (!isNoteVisible(l.from) || !isNoteVisible(l.to)) return;
      var p1 = centerPoint(a), p2 = centerPoint(b);
      var dx = Math.max(80, Math.abs(p2.x - p1.x) * .45);
      var d = 'M '+p1.x+' '+p1.y+' C '+(p1.x+dx)+' '+p1.y+', '+(p2.x-dx)+' '+p2.y+', '+p2.x+' '+p2.y;
      var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('class', 'tcNoteLink');
      path.setAttribute('d', d);
      path.setAttribute('data-from', l.from);
      path.setAttribute('data-to', l.to);
      path.setAttribute('data-type', l.type || 'manual');
      layer.appendChild(path);
    });
  }
  function createChildNote(parentId, title, body){
    var parent = noteById(parentId);
    if (!parent) return null;
    var existing = childLinksFrom(parentId).length;
    parent.collapsed = false;
    var child = createNote(parent.x + 300, parent.y + existing * 124, title || 'New branch', body || '', noteBucket(parent));
    links.push({from: parent.id, to: child.id, type: 'child'});
    reflowMindMap(parent.id);
    selectNote(child.id);
    focusNoteText(child.id);
    saveSoon();
    return child;
  }
  function createSiblingNote(id, title, body){
    var n = noteById(id);
    if (!n) return null;
    var parentLink = parentLinkFor(id);
    if (parentLink) return createChildNote(parentLink.from, title, body);
    var sibling = createNote(n.x, n.y + 132, title || 'New branch', body || '', noteBucket(n));
    reflowMindMap();
    selectNote(sibling.id);
    focusNoteText(sibling.id);
    saveSoon();
    return sibling;
  }
  function subtreeSlots(id, seen){
    seen = seen || {};
    if (seen[id]) return 1;
    seen[id] = true;
    var kids = childLinksFrom(id);
    if (!kids.length || (noteById(id) || {}).collapsed) return 1;
    var slots = 0;
    kids.forEach(function(l){ slots += subtreeSlots(l.to, Object.assign({}, seen)); });
    return Math.max(1, slots);
  }
  function placeSubtree(id, x, y, seen){
    var n = noteById(id);
    if (!n || (seen && seen[id])) return;
    seen = seen || {};
    seen[id] = true;
    n.x = x; n.y = y;
    var el = document.querySelector('.tcNoteNode[data-note-id="'+escAttr(id)+'"]');
    if (el){ el.style.left = x + 'px'; el.style.top = y + 'px'; }
    var kids = childLinksFrom(id);
    if (!kids.length || n.collapsed) return;
    var rowH = 132;
    var total = 0;
    kids.forEach(function(l){ total += subtreeSlots(l.to, Object.assign({}, seen)); });
    var cursor = y - ((total - 1) * rowH) / 2;
    kids.forEach(function(l){
      var slots = subtreeSlots(l.to, Object.assign({}, seen));
      var childY = cursor + ((slots - 1) * rowH) / 2;
      placeSubtree(l.to, x + 300, Math.max(24, childY|0), Object.assign({}, seen));
      cursor += slots * rowH;
    });
  }
  function reflowMindMap(preferredRootId){
    if (!notes.length) return;
    var roots = [];
    if (preferredRootId && noteById(preferredRootId)) roots.push(noteById(preferredRootId));
    notes.forEach(function(n){ if (roots.indexOf(n) === -1 && !hasChildParent(n.id)) roots.push(n); });
    var rootY = roots.length === 1 ? toInt(roots[0].y, 180) : 140;
    roots.forEach(function(root, idx){
      var slots = subtreeSlots(root.id, {});
      var y = idx === 0 && roots.length === 1 ? rootY : rootY + idx * Math.max(180, slots * 132);
      placeSubtree(root.id, toInt(root.x, 160), y, {});
    });
    renderAll();
    saveSoon();
  }
  function renderAll(){
    qsa('.tcNoteNode').forEach(function(el){ el.remove(); });
    notes.forEach(renderNote);
    if (selectedNoteId) syncSelection();
    applyVisibility();
    renderBuckets();
    renderLinks();
  }
  function installCanvasClick(){
    var st = stage(); if (!st || st.__notesClick) return;
    st.__notesClick = true;
    st.addEventListener('click', function(ev){
      if (!noteMode) return;
      if (ev.target.closest('.node, .tcNoteNode, .projAreaLabel, .tagAreaLabel, .depHandle')) return;
      var p = screenToStage(ev.clientX, ev.clientY);
      createNote(p.x, p.y);
      noteMode = false;
      syncButtons();
      ev.preventDefault();
      ev.stopPropagation();
    }, true);
  }
  function installLassoSelection(){
    var st = stage(); if (!st || st.__notesLasso) return;
    st.__notesLasso = true;
    st.addEventListener('mousedown', function(ev){
      if (ev.button !== 0 || noteMode || linkMode) return;
      if (ev.target.closest('.tcNoteNode, .node, .projAreaLabel, .tagAreaLabel, .tagAddBtn, .depHandle')) return;
      var start = screenToStage(ev.clientX, ev.clientY);
      lasso = {sx:start.x, sy:start.y, x:start.x, y:start.y, active:false, additive:!!(ev.shiftKey || ev.ctrlKey || ev.metaKey)};
    }, true);
    document.addEventListener('mousemove', function(ev){
      if (!lasso) return;
      var p = screenToStage(ev.clientX, ev.clientY);
      var dx = p.x - lasso.sx, dy = p.y - lasso.sy;
      if (!lasso.active && Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
      if (!lasso.active){
        lasso.active = true;
        lasso.el = document.createElement('div');
        lasso.el.className = 'tcNoteMarquee';
        stage().appendChild(lasso.el);
      }
      lasso.x = Math.min(lasso.sx, p.x);
      lasso.y = Math.min(lasso.sy, p.y);
      lasso.w = Math.abs(dx);
      lasso.h = Math.abs(dy);
      lasso.el.style.left = lasso.x + 'px';
      lasso.el.style.top = lasso.y + 'px';
      lasso.el.style.width = lasso.w + 'px';
      lasso.el.style.height = lasso.h + 'px';
    }, true);
    document.addEventListener('mouseup', function(){
      if (!lasso) return;
      if (lasso.active){
        var box = {x:lasso.x, y:lasso.y, w:lasso.w, h:lasso.h};
        var ids = [];
        qsa('.tcNoteNode').forEach(function(el){
          if (el.style.display === 'none') return;
          var id = el.getAttribute('data-note-id');
          var nr = {x:toInt(el.style.left, 0), y:toInt(el.style.top, 0), w:el.offsetWidth, h:el.offsetHeight};
          if (rectsOverlap(box, nr)) ids.push(id);
        });
        selectNotes(ids, lasso.additive);
        if (lasso.el) lasso.el.remove();
      }
      lasso = null;
    }, true);
  }
  function wrapDrawLinks(){
    if (window.drawLinks && !window.drawLinks.__notesWrapped){
      var orig = window.drawLinks;
      window.drawLinks = function(){
        var rv = orig.apply(this, arguments);
        try{ renderLinks(); }catch(_){}
        return rv;
      };
      window.drawLinks.__notesWrapped = true;
    }
  }
  function installKeyboardShortcuts(){
    if (document.__notesKeyboard) return;
    document.__notesKeyboard = true;
    document.addEventListener('keydown', function(ev){
      if (!selectedNoteId || !noteById(selectedNoteId)) return;
      if (ev.altKey || ev.ctrlKey || ev.metaKey || ev.shiftKey) return;
      if (ev.target && ev.target.closest && ev.target.closest('input, textarea, select')) return;
      if (ev.target && ev.target.closest && ev.target.closest('[contenteditable="true"]') && !ev.target.closest('.tcNoteText')) return;
      if (ev.key === 'Tab'){
        ev.preventDefault();
        createChildNote(selectedNoteId);
      } else if (ev.key === 'Enter'){
        ev.preventDefault();
        createSiblingNote(selectedNoteId);
      } else if (ev.key === 'Delete' || ev.key === 'Backspace'){
        if (ev.target && ev.target.closest && ev.target.closest('[contenteditable="true"]')) return;
        ev.preventDefault();
        deleteSelectedNotes();
      }
    });
  }
  function exportData(){
    return {
      kind: 'taskcanvas.notes',
      version: 1,
      exportedAt: new Date().toISOString(),
      notes: notes.map(function(n){
        return {id:n.id, x:toInt(n.x, 160), y:toInt(n.y, 160), content:n.content || 'New note', bucket:noteBucket(n), collapsed:!!n.collapsed};
      }),
      links: links.map(function(l){
        return {from:l.from, to:l.to, type:l.type || 'manual'};
      })
    };
  }
  function exportJSON(){
    return JSON.stringify(exportData(), null, 2);
  }
  function downloadExport(){
    var text = exportJSON();
    var blob = new Blob([text], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'taskcanvas-notes.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 0);
  }
  function importData(data){
    if (typeof data === 'string') data = JSON.parse(data);
    if (!data || !Array.isArray(data.notes)) throw new Error('Import file must contain a notes array');
    var nextNotes = data.notes.map(normalizeNote);
    var ids = {};
    nextNotes.forEach(function(n){
      while (ids[n.id]) n.id = uid();
      ids[n.id] = true;
    });
    var nextLinks = Array.isArray(data.links) ? data.links.filter(function(l){
      return l && ids[l.from] && ids[l.to] && l.from !== l.to;
    }).map(function(l){
      return {from:l.from, to:l.to, type:l.type || 'manual'};
    }) : [];
    notes = nextNotes;
    links = nextLinks;
    selectedNoteId = null;
    selectedNoteIds = {};
    renderAll();
    saveNow();
    return {notes:notes.length, links:links.length};
  }
  function importJSON(text){
    return importData(text);
  }
  function stageSelectedNotesAsTasks(){
    var ids = selectedIds();
    if (!ids.length && selectedNoteId) ids = [selectedNoteId];
    ids = ids.filter(function(id){ return !!noteById(id); });
    if (!ids.length) return 0;
    var A = window.STAGED_CMDS = Array.isArray(window.STAGED_CMDS) ? window.STAGED_CMDS : [];
    window.__NOTE_TASK_CMD_BY_ID__ = window.__NOTE_TASK_CMD_BY_ID__ || {};
    ids.forEach(function(id){
      var old = window.__NOTE_TASK_CMD_BY_ID__[id];
      if (old){
        for (var i=A.length-1;i>=0;i--) if (A[i] === old) A.splice(i, 1);
      }
      var n = noteById(id);
      var cmd = 'task add ' + commandText(n && n.content);
      window.__NOTE_TASK_CMD_BY_ID__[id] = cmd;
      A.push(cmd);
    });
    try{ if (typeof updateConsole === 'function') updateConsole(); }catch(_){}
    return ids.length;
  }
  function setBucket(id, bucket){
    var n = noteById(id);
    if (!n) return false;
    n.bucket = bucketText(bucket);
    renderAll();
    saveSoon();
    return true;
  }
  function boot(){
    ensureToolbar();
    loadState();
    renderAll();
    installCanvasClick();
    installLassoSelection();
    installKeyboardShortcuts();
    wrapDrawLinks();
    try{ renderLinks(); }catch(_){}
  }
  window.TaskCanvasNotes = {
    createNote: createNote,
    createChildNote: createChildNote,
    createSiblingNote: createSiblingNote,
    deleteSelectedNotes: deleteSelectedNotes,
    exportData: exportData,
    exportJSON: exportJSON,
    importData: importData,
    importJSON: importJSON,
    stageSelectedNotesAsTasks: stageSelectedNotesAsTasks,
    linkNotes: function(from, to, type){ if (from && to && from !== to && !linkExists(from, to)){ links.push({from:from, to:to, type:type || 'manual'}); renderLinks(); saveSoon(); } },
    reflowMindMap: reflowMindMap,
    toggleCollapse: toggleCollapse,
    setBucket: setBucket,
    selectNote: selectNote,
    selectedNotes: function(){ return selectedIds(); },
    notes: function(){ return notes.slice(); },
    links: function(){ return links.slice(); },
    render: renderAll,
    save: saveNow
  };
  window.addEventListener('load', function(){ setTimeout(boot, 120); });
  document.addEventListener('twdata', function(){ setTimeout(boot, 0); });
})();</script>
